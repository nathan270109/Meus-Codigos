<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exposição — CSS Fundamentos · Aula 02</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;gap:8px;flex-wrap:wrap}
.badge{background:#0284C7;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600}.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;font-family:'Courier New',monospace;color:#475569}
.timer.warn{color:#d97706;background:#fffbeb}.timer.danger{color:#dc2626;background:#fef2f2}
.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#0284C7;transform:scale(1.4)}.dot.done{background:#7dd3fc;opacity:.6}
.dsep{width:10px;height:1px;background:#e2e8f0;flex-shrink:0}
.slide-wrap{flex:1;overflow:hidden;position:relative}
.slide{position:absolute;inset:0;padding:22px 28px;overflow-y:auto;display:none}
.slide.active{display:block;animation:sIn .22s ease}
@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ey{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#0284C7;margin-bottom:5px}
.stitle{font-size:21px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:5px}
.ssub{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px}
.card.ac{border-left:3px solid #0284C7}
.ci{font-size:18px;margin-bottom:5px}.ct{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.cb{font-size:12px;color:#64748b;line-height:1.5}
code{font-family:'Courier New',monospace;font-size:11.5px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
.cw{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:10px 0}
.ch{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:7px 13px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:500;color:#64748b}
.cd{display:flex;gap:5px}.c1{width:10px;height:10px;border-radius:50%}
pre{background:#1e293b;color:#e2e8f0;padding:13px 16px;font-size:12px;line-height:1.8;overflow-x:auto;font-family:'Courier New',monospace;white-space:pre}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.cm{color:#475569;font-style:italic}
.hl{background:#f0f9ff;border-left:3px solid #0284C7;padding:10px 13px;font-size:12.5px;color:#0c4a6e;line-height:1.55;margin:10px 0}
.hl strong{color:#075985;font-weight:600}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:540px){.compare{grid-template-columns:1fr}}
.cs{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.csh{padding:8px 13px;font-size:12px;font-weight:600}.csb{padding:10px 13px;font-size:12px;color:#64748b;line-height:1.65}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px;margin-bottom:10px}
.si{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .15s}
.si:hover{border-color:#7dd3fc;background:#f0f9ff}.si.on{border-color:#0284C7;background:#e0f2fe}
.sc{font-family:'Courier New',monospace;font-size:12px;font-weight:600;color:#0284C7;margin-bottom:3px}
.sn{font-size:11px;color:#94a3b8}
.sp{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:11px 13px;min-height:50px;font-size:13px;color:#64748b;line-height:1.6}
.sp strong{color:#1e293b;font-family:'Courier New',monospace;font-size:11.5px}
.qa{font-size:13.5px;font-weight:600;color:#1e293b;margin-bottom:11px;line-height:1.5}
.qo{display:flex;flex-direction:column;gap:7px}
.qop{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;color:#1e293b;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px}
.qop:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#7dd3fc;background:#f0f9ff}
.qop.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.qop.dimmed{opacity:.4;pointer-events:none}
.qfb{margin-top:9px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5;display:none}
.qb{margin-bottom:16px}
.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}
.rn{width:23px;height:23px;min-width:23px;border-radius:6px;background:#e0f2fe;color:#0284C7;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0;color:#1e293b}.nb.pr{background:#0284C7;color:#fff;border-color:#0284C7}
.nb.pr:hover{background:#0369a1}.nb:disabled{opacity:.35;pointer-events:none}
.nc{font-size:12px;color:#94a3b8}
.bm{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0}
.bm-vis{border:2px dashed #94a3b8;border-radius:8px;padding:10px;text-align:center}
.bm-label{font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:5px}
.spec-row{display:flex;gap:8px;align-items:center;margin:6px 0;flex-wrap:wrap}
.sb{border-radius:6px;padding:5px 11px;font-size:12px;font-weight:600;font-family:'Courier New',monospace}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:11px">
      <span class="badge">Aula 02</span>
      <div><div class="hdr-title">CSS Fundamentos — Exposição Dialogada</div><div class="hdr-sub">30 minutos · Projetor · Turma</div></div>
    </div>
    <div class="timer" id="timer">30:00</div>
  </div>
  <div class="dots" id="dots-bar"></div>
  <div class="slide-wrap" id="slide-wrap"></div>
  <div class="nav">
    <button class="nb" id="btn-prev" onclick="nav(-1)" disabled>← Anterior</button>
    <span class="nc" id="counter">1 / 9</span>
    <button class="nb pr" id="btn-next" onclick="nav(1)">Próximo →</button>
  </div>
</div>
<script>
const SL=[
{id:'s0',r:()=>`<div class="ey">Abertura · 3 min</div>
<div class="stitle">CSS — a linguagem que dá vida à web</div>
<div class="ssub">Na aula passada criamos a estrutura HTML. Hoje aprendemos a transformar uma página sem estilo em uma interface profissional.</div>
<div class="cards">
<div class="card ac"><div class="ci">🎨</div><div class="ct">O que é CSS?</div><div class="cb">Cascading Style Sheets. Controla cores, fontes, espaçamentos e layout de qualquer elemento HTML.</div></div>
<div class="card ac"><div class="ci">📄</div><div class="ct">HTML vs CSS</div><div class="cb">HTML é o esqueleto. CSS é a aparência. O mesmo HTML pode virar qualquer site do mundo com CSS diferente.</div></div>
<div class="card"><div class="ci">💬</div><div class="ct">Atividade de abertura</div><div class="cb"><em>"Abram o site da Apple. No DevTools (F12), desativem todos os estilos. O que acontece com a página?"</em></div></div>
<div class="card"><div class="ci">🎯</div><div class="ct">O que veremos</div><div class="cb">3 formas de CSS, seletores, Box Model, cores, tipografia, pseudo-classes e transições.</div></div>
</div>`},
{id:'s1',r:()=>`<div class="ey">Conceito central · 4 min</div>
<div class="stitle">O "C" de CSS — a Cascata</div>
<div class="ssub">Quando dois estilos conflitam, qual vence? Três regras determinam o resultado.</div>
<div class="cards" style="grid-template-columns:1fr 1fr 1fr">
<div class="card ac"><div class="ct">1. Especificidade</div><div class="cb">ID (#id) &gt; Classe (.classe) &gt; Tag (p). Quanto mais específico, mais força.</div></div>
<div class="card ac"><div class="ct">2. Ordem no arquivo</div><div class="cb">Mesma especificidade? O último escrito no arquivo vence.</div></div>
<div class="card ac"><div class="ct">3. Herança</div><div class="cb">Filhos herdam certas propriedades do pai (font-family, color). Margin e border não herdam.</div></div>
</div>
<div class="hl"><strong>Especificidade visual:</strong><br><div class="spec-row">
<span class="sb" style="background:#fef3c7;color:#92400e">p { } → 001</span>
<span style="color:#94a3b8">→</span>
<span class="sb" style="background:#e0f2fe;color:#075985">.classe { } → 010</span>
<span style="color:#94a3b8">→</span>
<span class="sb" style="background:#ede9fe;color:#5b21b6">#id { } → 100</span>
</div>
O <code>#id</code> sempre vence, independente da ordem no arquivo.</div>
<div class="hl" style="margin-top:8px"><strong>!important:</strong> <code>color: red !important</code> vence tudo — mas é sinal de CSS mal organizado. Evite.</div>`},
{id:'s2',r:()=>`<div class="ey">Aplicação · 3 min</div>
<div class="stitle">3 formas de aplicar CSS</div>
<div class="ssub">Cada uma tem seu lugar, mas o arquivo externo é sempre o método profissional.</div>
<div class="compare">
<div class="cs"><div class="csh" style="background:#fef2f2;color:#dc2626">1. Inline — evite</div><div class="csb">Diretamente na tag.<br><code>&lt;p style="color:red"&gt;Texto&lt;/p&gt;</code><br>Difícil de manter, não reutilizável. Válido apenas para e-mail marketing.</div></div>
<div class="cs"><div class="csh" style="background:#fffbeb;color:#92400e">2. Interno — ok para testes</div><div class="csb">Na tag <code>&lt;style&gt;</code> no <code>&lt;head&gt;</code>. Não reutilizável entre páginas. Bom para estudos rápidos.</div></div>
</div>
<div class="cw"><div class="ch"><span>3. Externo — o método correto para projetos</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
<pre><span class="cm">/* No HTML: &lt;link rel="stylesheet" href="css/estilos.css"&gt; */</span>

<span class="cm">/* No arquivo estilos.css: */</span>
<span class="k">body</span> {
  <span class="p">font-family</span>: <span class="s">'Inter', Arial, sans-serif</span>;
  <span class="p">background-color</span>: <span class="v">#f8fafc</span>;
  <span class="p">color</span>: <span class="v">#1e293b</span>;
}

<span class="k">h1</span> {
  <span class="p">font-size</span>: <span class="v">2rem</span>;
  <span class="p">font-weight</span>: <span class="v">700</span>;
}</pre></div>
<div class="hl"><strong>Vantagem do externo:</strong> todas as páginas compartilham o mesmo arquivo. Mude uma cor — todas as páginas atualizam automaticamente.</div>`},
{id:'s3',r:()=>`<div class="ey">Prática interativa · 4 min</div>
<div class="stitle">Seletores CSS — clique para explorar</div>
<div class="ssub">O seletor diz ao CSS <em>quem</em> recebe o estilo. Cada tipo tem sua força e caso de uso.</div>
<div class="sg">
<div class="si" onclick="showSel(this,'Seletor de tag','p, h1, nav { }','Seleciona TODOS os elementos daquele tipo. Use para estilos base que se aplicam globalmente.')"><div class="sc">tag</div><div class="sn">p, h1, nav</div></div>
<div class="si" onclick="showSel(this,'Seletor de classe (.classe)','class=&quot;btn&quot; → .btn { }','O mais usado. Crie a classe e aplique em quantos elementos precisar. Reutilizável.')"><div class="sc">.classe</div><div class="sn">ex: .btn</div></div>
<div class="si" onclick="showSel(this,'Seletor de ID (#id)','id=&quot;header&quot; → #header { }','Seleciona um elemento único. Especificidade alta — use com moderação.')"><div class="sc">#id</div><div class="sn">ex: #header</div></div>
<div class="si" onclick="showSel(this,'Descendente (A B)','nav a { } → links DENTRO do nav','Estiliza filhos (e netos) de um elemento. Muito usado em menus de navegação.')"><div class="sc">A B</div><div class="sn">descendente</div></div>
<div class="si" onclick="showSel(this,'Filho direto (A &gt; B)','nav &gt; a { } → apenas filhos imediatos','Mais restrito: só filhos diretos, não netos. Evita estilos indesejados em elementos profundos.')"><div class="sc">A &gt; B</div><div class="sn">filho direto</div></div>
<div class="si" onclick="showSel(this,'Agrupamento (A, B)','h1, h2, h3 { color: #333 }','Aplica o mesmo estilo a vários seletores. Evita repetição de código.')"><div class="sc">A, B</div><div class="sn">agrupamento</div></div>
</div>
<div class="sp" id="sel-prev">Clique em um seletor acima para ver como funciona.</div>`},
{id:'s4',r:()=>`<div class="ey">Conceito essencial · 5 min</div>
<div class="stitle">Box Model — tudo é uma caixa</div>
<div class="ssub">Todo elemento HTML é uma caixa retangular. O Box Model define o espaço que ela ocupa.</div>
<div class="bm">
<div class="bm-vis">
  <div class="bm-label">MARGIN</div>
  <div style="border:2px solid #f59e0b;border-radius:6px;padding:8px">
    <div style="font-size:11px;font-weight:600;color:#d97706;margin-bottom:4px">BORDER</div>
    <div style="background:#e0f2fe;border-radius:4px;padding:7px">
      <div style="font-size:11px;font-weight:600;color:#0284c7;margin-bottom:4px">PADDING</div>
      <div style="background:#0284c7;color:#fff;border-radius:4px;padding:7px;font-size:12px;font-weight:600">CONTENT</div>
    </div>
  </div>
</div>
<div style="display:flex;flex-direction:column;gap:8px">
<div class="card"><div class="ct">Content</div><div class="cb">O conteúdo em si (texto, imagem). width e height controlam este espaço.</div></div>
<div class="card"><div class="ct">Padding</div><div class="cb">Espaço interno. Aumenta a área clicável sem mover outros elementos.</div></div>
<div class="card"><div class="ct">Border</div><div class="cb">Borda visível. Estilo (solid/dashed), espessura e cor.</div></div>
<div class="card"><div class="ct">Margin</div><div class="cb">Espaço externo. Empurra outros elementos para longe.</div></div>
</div>
</div>
<div class="cw"><div class="ch"><span>box-sizing — a propriedade mais importante do Box Model</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
<pre><span class="cm">/* SEM box-sizing: width:300px + padding:20px = 340px total */</span>
<span class="k">.caixa</span> { <span class="p">width</span>: <span class="v">300px</span>; <span class="p">padding</span>: <span class="v">20px</span>; }

<span class="cm">/* COM box-sizing: width TOTAL = 300px (padding incluído) */</span>
<span class="k">*</span> { <span class="p">box-sizing</span>: <span class="v">border-box</span>; } <span class="cm">/* sempre no início do CSS */</span>
<span class="k">.caixa</span> { <span class="p">width</span>: <span class="v">300px</span>; <span class="p">padding</span>: <span class="v">20px</span>; }</pre></div>`},
{id:'s5',r:()=>`<div class="ey">Propriedades · 3 min</div>
<div class="stitle">Cores e tipografia</div>
<div class="ssub">As ferramentas mais usadas para dar personalidade a uma página.</div>
<div class="cw"><div class="ch"><span>CSS · Cores e tipografia</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
<pre><span class="k">body</span> {
  <span class="cm">/* Fontes — liste fallbacks para segurança */</span>
  <span class="p">font-family</span>: <span class="s">'Inter', Arial, sans-serif</span>;
  <span class="p">font-size</span>:   <span class="v">16px</span>;    <span class="cm">/* base = 16px */</span>
  <span class="p">font-weight</span>: <span class="v">400</span>;     <span class="cm">/* 400=normal, 700=bold */</span>
  <span class="p">line-height</span>: <span class="v">1.6</span>;     <span class="cm">/* espaço entre linhas */</span>
  <span class="p">color</span>:       <span class="v">#1e293b</span>;
}

<span class="cm">/* 4 formas de definir cor no CSS */</span>
<span class="k">.exemplo</span> {
  <span class="p">color</span>: <span class="v">tomato</span>;                    <span class="cm">/* nome (140 nomes nativos) */</span>
  <span class="p">color</span>: <span class="v">#2563eb</span>;                  <span class="cm">/* hexadecimal (mais usado) */</span>
  <span class="p">color</span>: <span class="v">rgb(37, 99, 235)</span>;         <span class="cm">/* RGB */</span>
  <span class="p">color</span>: <span class="v">rgba(37, 99, 235, 0.5)</span>;  <span class="cm">/* RGBA com transparência */</span>
  <span class="p">background-color</span>: <span class="v">#f8fafc</span>;
  <span class="p">text-align</span>: <span class="v">center</span>;
  <span class="p">text-transform</span>: <span class="v">uppercase</span>;
}</pre></div>
<div class="hl"><strong>Google Fonts:</strong> acesse fonts.google.com, escolha uma fonte, copie o <code>&lt;link&gt;</code> e cole no <code>&lt;head&gt;</code> do HTML. Gratuito e sem instalação local.</div>`},
{id:'s6',r:()=>`<div class="ey">Interatividade visual · 3 min</div>
<div class="stitle">Pseudo-classes e transições</div>
<div class="ssub">Como fazer elementos reagirem ao mouse — sem uma linha de JavaScript.</div>
<div class="cw"><div class="ch"><span>CSS · :hover, :focus, :active e transition</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
<pre><span class="k">a</span> {
  <span class="p">color</span>: <span class="v">#0284c7</span>;
  <span class="p">text-decoration</span>: <span class="v">none</span>;
  <span class="p">transition</span>: <span class="v">color .2s ease</span>; <span class="cm">/* animação suave */</span>
}
<span class="k">a:hover</span>  { <span class="p">color</span>: <span class="v">#075985</span>; }   <span class="cm">/* mouse em cima */</span>
<span class="k">a:focus</span>  { <span class="p">outline</span>: <span class="v">2px solid #0284c7</span>; } <span class="cm">/* Tab no teclado */</span>
<span class="k">a:active</span> { <span class="p">color</span>: <span class="v">#0c4a6e</span>; }  <span class="cm">/* clicando */</span>

<span class="k">button</span> {
  <span class="p">background</span>: <span class="v">#0284c7</span>;
  <span class="p">color</span>: <span class="v">white</span>;
  <span class="p">padding</span>: <span class="v">10px 24px</span>;
  <span class="p">border</span>: <span class="v">none</span>;
  <span class="p">border-radius</span>: <span class="v">8px</span>;
  <span class="p">cursor</span>: <span class="v">pointer</span>;
  <span class="p">transition</span>: <span class="v">background .2s, transform .1s</span>;
}
<span class="k">button:hover</span>  { <span class="p">background</span>: <span class="v">#0369a1</span>; }
<span class="k">button:active</span> { <span class="p">transform</span>: <span class="v">scale(0.97)</span>; }</pre></div>
<div class="hl"><strong>transition:</strong> propriedade duração timing. O browser anima automaticamente entre os estados. Nenhum JavaScript necessário.</div>`},
{id:'s7',r:()=>`<div class="ey">Verificação · 3 min</div>
<div class="stitle">Quiz — turma responde junto</div>
<div class="ssub">Consolidando o que aprendemos.</div>
<div class="qb">
<div class="qa">1. Três estilos no mesmo parágrafo: via tag <code>p</code>, via <code>.classe</code> e via <code>#id</code>. Qual vence?</div>
<div class="qo">
<div class="qop" onclick="ans(this,'w','f0')"><span>A</span>O da tag p — foi escrito primeiro</div>
<div class="qop" onclick="ans(this,'w','f0')"><span>B</span>O da classe — classes vencem tags</div>
<div class="qop" onclick="ans(this,'c','f0')"><span>C</span>O do id — IDs têm maior especificidade</div>
<div class="qop" onclick="ans(this,'w','f0')"><span>D</span>O último escrito no arquivo</div>
</div>

let cur=0,ts=false,ti=null;
function bd(){const b=document.getElementById('dots-bar');SL.forEach((s,i)=>{const d=document.createElement('span');d.className='dot'+(i===0?' active':'');d.onclick=()=>gt(i);b.appendChild(d);if(i<SL.length-1){const sep=document.createElement('div');sep.className='dsep';b.appendChild(sep);}});}
function bs(){const w=document.getElementById('slide-wrap');SL.forEach((s,i)=>{const d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='sl-'+s.id;d.innerHTML=s.r();w.appendChild(d);});}
function gt(i){const p=cur;document.getElementById('sl-'+SL[p].id).classList.remove('active');const dots=document.querySelectorAll('.dot');dots[p].classList.remove('active');if(i>p)dots[p].classList.add('done');cur=i;const el=document.getElementById('sl-'+SL[cur].id);el.innerHTML=SL[cur].r();el.classList.add('active');dots[cur].classList.add('active');dots[cur].classList.remove('done');document.getElementById('btn-prev').disabled=cur===0;const bn=document.getElementById('btn-next');bn.disabled=cur===SL.length-1;bn.textContent=cur===SL.length-1?'Finalizar':'Próximo →';document.getElementById('counter').textContent=(cur+1)+' / '+SL.length;if(!ts){ts=true;st();}}
function nav(d){const ni=cur+d;if(ni>=0&&ni<SL.length)gt(ni);}
function st(){let r=30*60;const el=document.getElementById('timer');ti=setInterval(()=>{r--;const m=Math.floor(r/60),s=r%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(r<=300)el.className='timer warn';if(r<=60)el.className='timer danger';if(r<=0){clearInterval(ti);el.textContent='00:00';}},1000);}
function showSel(el,titulo,ex,desc){document.querySelectorAll('.si').forEach(c=>c.classList.remove('on'));el.classList.add('on');document.getElementById('sel-prev').innerHTML='<strong>'+titulo+'</strong><br><code style="display:block;margin:4px 0;font-size:11px">'+ex+'</code>'+desc;}
function ans(el,t,id){const b=el.closest('.qb');b.querySelectorAll('.qop').forEach(o=>{if(o===el)o.classList.add(t==='c'?'correct':'wrong');else o.classList.add('dimmed');});const fb=document.getElementById(id);if(t!=='c'){fb.style.background='#fef2f2';fb.style.color='#dc2626';fb.textContent='Não exatamente — pense na ordem de especificidade: tag, classe, ID.';}fb.style.display='block';}
bd();bs();document.getElementById('btn-prev').disabled=true;
