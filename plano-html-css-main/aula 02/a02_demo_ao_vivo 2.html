<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demonstração ao Vivo — CSS Fundamentos · Aula 02</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;min-height:100vh;padding:20px}
.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.page-hdr{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.page-hdr h1{font-size:16px;font-weight:600}.page-hdr p{font-size:12px;color:#94a3b8}
.prog-track{grid-column:1/-1;height:3px;background:#e2e8f0;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#0284C7;border-radius:2px;transition:width .3s ease;width:0%}
.panel{border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;background:#fff}
.ph{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-bottom:1px solid #e2e8f0;background:#f8fafc}
.pt{font-size:12px;font-weight:500;color:#64748b}
.dots-r{display:flex;gap:5px}
.dot{width:10px;height:10px;border-radius:50%}
.editor-body{background:#1e293b;min-height:340px;padding:15px;font-family:'Courier New',monospace;font-size:12px;line-height:1.8;color:#94a3b8;overflow:hidden}
#code-out{white-space:pre-wrap;word-break:break-all}
.cursor{display:inline-block;width:2px;height:14px;background:#60a5fa;vertical-align:middle;animation:blink .9s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.preview-body{min-height:340px;padding:15px;overflow-y:auto;background:#fff}
.step-bar{grid-column:1/-1;padding:11px 15px;border-top:0px;border:1px solid #e2e8f0;border-radius:12px;background:#fff;display:flex;align-items:center;gap:10px}
.sbadge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;background:#e0f2fe;color:#0284C7}
.slabel{font-size:12px;color:#64748b;flex:1;line-height:1.4}
.cb{font-size:12px;font-weight:500;padding:6px 14px;border-radius:8px;border:1px solid #cbd5e1;background:#fff;color:#1e293b;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.cb:hover{background:#f1f5f9}.cb.go{background:#0284C7;color:#fff;border-color:#0284C7}.cb.go:hover{background:#0369a1}
.cb:disabled{opacity:.35;pointer-events:none}
.narr{grid-column:1/-1;border:1px solid #e2e8f0;border-radius:10px;padding:11px 15px;background:#f0f9ff;font-size:13px;color:#0c4a6e;line-height:1.6;min-height:50px}
.narr strong{color:#075985;font-weight:600}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.c{color:#475569;font-style:italic}
@media(max-width:680px){.wrap{grid-template-columns:1fr}.panel:last-of-type{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="page-hdr"><h1>Demonstração ao vivo — CSS Fundamentos</h1><p>Aula 02 · 45 min · Docente digita, alunos acompanham</p></div>
  <div class="prog-track"><div class="prog-fill" id="prog"></div></div>
  <div class="panel">
    <div class="ph"><span class="pt">VS Code — css/estilos.css</span><div class="dots-r"><div class="dot" style="background:#ef4444"></div><div class="dot" style="background:#f59e0b"></div><div class="dot" style="background:#10b981"></div></div></div>
    <div class="editor-body"><span id="code-out"></span><span class="cursor"></span></div>
  </div>
  <div class="panel">
    <div class="ph"><span class="pt">Navegador — resultado ao vivo</span><div class="dots-r"><div class="dot" style="background:#ef4444"></div><div class="dot" style="background:#f59e0b"></div><div class="dot" style="background:#10b981"></div></div></div>
    <div class="preview-body" id="preview"></div>
  </div>
  <div class="narr" id="narr">Pronto para começar. Clique em <strong>Iniciar digitação</strong> para ver o CSS sendo criado do zero.</div>
  <div class="step-bar">
    <span class="sbadge" id="sbadge">Etapa 1 / 8</span>
    <span class="slabel" id="sdesc">Criando o arquivo CSS e linkando ao HTML</span>
    <button class="cb" id="bp" onclick="prevS()" disabled>← Anterior</button>
    <button class="cb go" id="bplay" onclick="playS()">Iniciar digitação</button>
    <button class="cb" id="bn" onclick="nextS()" disabled>Próxima →</button>
  </div>
</div>
<script>
const STEPS=[
{label:"Criar arquivo e link no HTML",
narr:"<strong>Docente:</strong> \"Criamos a pasta <code>css/</code> e o arquivo <code>estilos.css</code>. No HTML, dentro do <code>&lt;head&gt;</code>, adicionamos o link. Este é o único jeito profissional de aplicar CSS.\"",
code:`<span class="c">/* css/estilos.css */</span>
<span class="c">/* Aula 02 — CSS Fundamentos */</span>

<span class="c">/* 1. box-sizing global — SEMPRE comece com isso */</span>
<span class="k">*</span>, <span class="k">*::before</span>, <span class="k">*::after</span> {
  <span class="p">box-sizing</span>: <span class="v">border-box</span>;
  <span class="p">margin</span>: <span class="v">0</span>;
  <span class="p">padding</span>: <span class="v">0</span>;
}`,
prev:`<p style="font-size:12px;color:#94a3b8;font-style:italic">No HTML, no &lt;head&gt;:<br><code style="background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:11px">&lt;link rel="stylesheet" href="css/estilos.css"&gt;</code><br><br>O reset de CSS já está ativo — zero margin/padding por padrão em tudo.</p>`},
{label:"Estilizando o body — fonte e cor base",
narr:"<strong>Docente:</strong> \"O <code>body</code> define os estilos padrão de toda a página. A propriedade <code>font-family</code> se herda para todos os filhos. Notem o <code>line-height</code> — 1.6× o tamanho da fonte, o valor ideal para leitura confortável.\"",
code:`<span class="c">/* 2. Estilos base do documento */</span>
<span class="k">body</span> {
  <span class="p">font-family</span>: <span class="s">'Segoe UI', Arial, sans-serif</span>;
  <span class="p">font-size</span>:   <span class="v">16px</span>;
  <span class="p">line-height</span>: <span class="v">1.6</span>;
  <span class="p">color</span>:       <span class="v">#1e293b</span>;
  <span class="p">background-color</span>: <span class="v">#f8fafc</span>;
}`,
prev:`<div style="font-family:'Segoe UI',Arial,sans-serif;font-size:16px;line-height:1.6;color:#1e293b;background:#f8fafc;padding:12px;border-radius:8px;border:1px solid #e2e8f0"><p style="margin-bottom:8px">Esta é a aparência do texto com os estilos base do body aplicados.</p><p>Fonte legível, cor de texto escura, fundo levemente cinza. Muito melhor que o branco puro!</p></div>`},
{label:"Estilizando o header semântico",
narr:"<strong>Docente:</strong> \"Usamos o seletor <code>header</code> para estilizar nosso cabeçalho semântico. O <code>text-align: center</code> centraliza tudo dentro. A <code>border-bottom</code> cria uma linha separadora elegante.\"",
code:`<span class="c">/* 3. Cabeçalho */</span>
<span class="k">header</span> {
  <span class="p">background-color</span>: <span class="v">#0284c7</span>;
  <span class="p">color</span>:            <span class="v">white</span>;
  <span class="p">text-align</span>:       <span class="v">center</span>;
  <span class="p">padding</span>:          <span class="v">40px 20px</span>;
}

<span class="k">header h1</span> {
  <span class="p">font-size</span>:   <span class="v">2.2rem</span>;
  <span class="p">font-weight</span>: <span class="v">700</span>;
  <span class="p">margin-bottom</span>: <span class="v">8px</span>;
}

<span class="k">header p</span> {
  <span class="p">font-size</span>:   <span class="v">1.1rem</span>;
  <span class="p">opacity</span>:     <span class="v">0.85</span>;
}`,
prev:`<div style="font-family:'Segoe UI',Arial,sans-serif;background:#f8fafc;border-radius:8px;overflow:hidden;border:1px solid #e2e8f0"><header style="background:#0284c7;color:white;text-align:center;padding:28px 16px"><h1 style="font-size:26px;font-weight:700;margin-bottom:6px">Meu Nome</h1><p style="font-size:14px;opacity:.85">Estudante de Desenvolvimento de Sistemas</p></header></div>`},
{label:"Estilizando a navegação",
narr:"<strong>Docente:</strong> \"O <code>nav</code> com <code>display: flex</code> e <code>gap</code> é um preview do que aprenderemos na Aula 05. Por enquanto o importante é ver como removemos o sublinhado dos links com <code>text-decoration: none</code> e adicionamos hover.\"",
code:`<span class="c">/* 4. Navegação */</span>
<span class="k">nav</span> {
  <span class="p">background</span>: <span class="v">#075985</span>;
  <span class="p">display</span>:    <span class="v">flex</span>;
  <span class="p">gap</span>:        <span class="v">4px</span>;
  <span class="p">padding</span>:    <span class="v">8px 16px</span>;
}

<span class="k">nav a</span> {
  <span class="p">color</span>:           <span class="v">white</span>;
  <span class="p">text-decoration</span>: <span class="v">none</span>;
  <span class="p">padding</span>:         <span class="v">8px 16px</span>;
  <span class="p">border-radius</span>:   <span class="v">6px</span>;
  <span class="p">font-weight</span>:     <span class="v">600</span>;
  <span class="p">transition</span>:      <span class="v">background .2s</span>;
}

<span class="k">nav a:hover</span> {
  <span class="p">background</span>: <span class="v">rgba(255,255,255,.15)</span>;
}`,
prev:`<div style="font-family:'Segoe UI',Arial,sans-serif;background:#f8fafc;border-radius:8px;overflow:hidden;border:1px solid #e2e8f0"><div style="background:#0284c7;color:white;text-align:center;padding:20px 16px"><h1 style="font-size:22px;font-weight:700;margin-bottom:4px">Meu Nome</h1><p style="font-size:13px;opacity:.85">Estudante · SENAI</p></div><nav style="background:#075985;display:flex;gap:4px;padding:8px 16px"><a href="#" style="color:white;text-decoration:none;padding:7px 14px;border-radius:6px;font-weight:600;font-size:13px;background:rgba(255,255,255,.15)">Início</a><a href="#" style="color:white;text-decoration:none;padding:7px 14px;border-radius:6px;font-weight:600;font-size:13px">Sobre</a><a href="#" style="color:white;text-decoration:none;padding:7px 14px;border-radius:6px;font-weight:600;font-size:13px">Contato</a></nav></div>`},
{label:"Estilizando main, section e h2",
narr:"<strong>Docente:</strong> \"O <code>max-width</code> com <code>margin: 0 auto</code> é um dos padrões mais usados em CSS — centraliza o conteúdo e limita a largura para melhor leitura. Notem o <code>border-left</code> no h2 — um detalhe simples com grande impacto visual.\"",
code:`<span class="c">/* 5. Conteúdo principal */</span>
<span class="k">main</span> {
  <span class="p">max-width</span>: <span class="v">800px</span>;
  <span class="p">margin</span>:    <span class="v">0 auto</span>; <span class="c">/* centraliza */</span>
  <span class="p">padding</span>:   <span class="v">40px 20px</span>;
}

<span class="k">section</span> {
  <span class="p">margin-bottom</span>: <span class="v">32px</span>;
}

<span class="k">h2</span> {
  <span class="p">font-size</span>:    <span class="v">1.4rem</span>;
  <span class="p">font-weight</span>:  <span class="v">700</span>;
  <span class="p">color</span>:        <span class="v">#0284c7</span>;
  <span class="p">border-left</span>:  <span class="v">4px solid #0284c7</span>;
  <span class="p">padding-left</span>: <span class="v">12px</span>;
  <span class="p">margin-bottom</span>: <span class="v">12px</span>;
}`,
prev:`<div style="font-family:'Segoe UI',Arial,sans-serif;background:#f8fafc;border-radius:8px;overflow:hidden;border:1px solid #e2e8f0"><div style="background:#0284c7;color:white;text-align:center;padding:14px"><h1 style="font-size:18px;font-weight:700">Meu Nome</h1></div><main style="max-width:100%;padding:20px"><section style="margin-bottom:20px"><h2 style="font-size:15px;font-weight:700;color:#0284c7;border-left:4px solid #0284c7;padding-left:10px;margin-bottom:10px">Sobre mim</h2><p style="font-size:13px;color:#475569;line-height:1.6">Sou estudante de desenvolvimento de sistemas no SENAI e apaixonado por tecnologia.</p></section></main></div>`},
{label:"Estilizando listas",
narr:"<strong>Docente:</strong> \"Por padrão listas têm marcadores pouco atraentes. Aqui removemos o padrão com <code>list-style: none</code> e criamos marcadores personalizados com pseudo-elemento <code>::before</code> — um recurso poderoso do CSS.\"",
code:`<span class="c">/* 6. Listas personalizadas */</span>
<span class="k">ul</span> {
  <span class="p">list-style</span>: <span class="v">none</span>;
  <span class="p">padding</span>:    <span class="v">0</span>;
}

<span class="k">ul li</span> {
  <span class="p">padding</span>:       <span class="v">8px 0 8px 20px</span>;
  <span class="p">border-bottom</span>: <span class="v">1px solid #e2e8f0</span>;
  <span class="p">position</span>:      <span class="v">relative</span>;
  <span class="p">font-size</span>:     <span class="v">.95rem</span>;
  <span class="p">color</span>:         <span class="v">#475569</span>;
}

<span class="k">ul li::before</span> {
  <span class="p">content</span>:  <span class="v">"›"</span>;
  <span class="p">color</span>:    <span class="v">#0284c7</span>;
  <span class="p">position</span>: <span class="v">absolute</span>;
  <span class="p">left</span>:     <span class="v">0</span>;
  <span class="p">font-weight</span>: <span class="v">700</span>;
}`,
prev:`<div style="font-family:'Segoe UI',Arial,sans-serif;background:#f8fafc;border-radius:8px;padding:16px;border:1px solid #e2e8f0"><h2 style="font-size:14px;font-weight:700;color:#0284c7;border-left:4px solid #0284c7;padding-left:10px;margin-bottom:12px">Tecnologias</h2><ul style="list-style:none;padding:0"><li style="padding:7px 0 7px 18px;border-bottom:1px solid #e2e8f0;position:relative;font-size:13px;color:#475569"><span style="position:absolute;left:0;color:#0284c7;font-weight:700">›</span>HTML5</li><li style="padding:7px 0 7px 18px;border-bottom:1px solid #e2e8f0;position:relative;font-size:13px;color:#475569"><span style="position:absolute;left:0;color:#0284c7;font-weight:700">›</span>CSS3</li><li style="padding:7px 0 7px 18px;position:relative;font-size:13px;color:#475569"><span style="position:absolute;left:0;color:#0284c7;font-weight:700">›</span>Git</li></ul></div>`},
{label:"Estilizando links",
narr:"<strong>Docente:</strong> \"Links por padrão são azul com sublinhado. Aqui personalizamos completamente a aparência e adicionamos a transição de cor ao passar o mouse. A propriedade <code>transition</code> anima a mudança automaticamente.\"",
code:`<span class="c">/* 7. Links */</span>
<span class="k">a</span> {
  <span class="p">color</span>:           <span class="v">#0284c7</span>;
  <span class="p">text-decoration</span>: <span class="v">none</span>;
  <span class="p">font-weight</span>:     <span class="v">600</span>;
  <span class="p">transition</span>:      <span class="v">color .2s ease</span>;
}

<span class="k">a:hover</span> {
  <span class="p">color</span>:           <span class="v">#075985</span>;
  <span class="p">text-decoration</span>: <span class="v">underline</span>;
}`,
prev:`<div style="font-family:'Segoe UI',Arial,sans-serif;background:#fff;border-radius:8px;padding:16px;border:1px solid #e2e8f0;font-size:13px;color:#475569;line-height:1.7">Veja meus projetos no <a href="#" style="color:#0284c7;text-decoration:none;font-weight:600">GitHub</a> e meu perfil no <a href="#" style="color:#0284c7;text-decoration:none;font-weight:600">LinkedIn</a>.<br><br><small style="color:#94a3b8">Passe o mouse nos links para ver a transição de cor.</small></div>`},
{label:"Footer e resultado final",
narr:"<strong>Docente:</strong> \"O footer recebe estilo semelhante ao header para consistência visual. Vejam o resultado completo à direita — isso é uma página HTML+CSS profissional. Agora é a vez de vocês criarem o próprio CSS!\"",
code:`<span class="c">/* 8. Rodapé */</span>
<span class="k">footer</span> {
  <span class="p">background</span>:   <span class="v">#1e293b</span>;
  <span class="p">color</span>:        <span class="v">rgba(255,255,255,.7)</span>;
  <span class="p">text-align</span>:   <span class="v">center</span>;
  <span class="p">padding</span>:      <span class="v">24px 20px</span>;
  <span class="p">font-size</span>:    <span class="v">.9rem</span>;
  <span class="p">margin-top</span>:   <span class="v">40px</span>;
}`,
prev:`<div style="font-family:'Segoe UI',Arial,sans-serif;background:#f8fafc;border-radius:8px;overflow:hidden;border:1px solid #e2e8f0;font-size:13px"><div style="background:#0284c7;color:white;text-align:center;padding:16px"><h1 style="font-size:18px;font-weight:700;margin-bottom:3px">Meu Nome</h1><p style="opacity:.85;font-size:12px">Estudante · SENAI</p></div><nav style="background:#075985;display:flex;gap:4px;padding:6px 12px"><a href="#" style="color:white;text-decoration:none;padding:5px 11px;border-radius:5px;font-weight:600;font-size:12px;background:rgba(255,255,255,.15)">Início</a><a href="#" style="color:white;text-decoration:none;padding:5px 11px;border-radius:5px;font-weight:600;font-size:12px">Sobre</a></nav><main style="padding:14px 16px"><h2 style="font-size:13px;font-weight:700;color:#0284c7;border-left:3px solid #0284c7;padding-left:8px;margin-bottom:8px">Sobre mim</h2><p style="color:#475569;font-size:12px;line-height:1.6">Apaixonado por tecnologia!</p></main><footer style="background:#1e293b;color:rgba(255,255,255,.7);text-align:center;padding:12px;font-size:11px">© 2025 Meu Nome — SENAI</footer></div>`}
];
let cur=0,typing=false,typeTimer=null;
function render(){const s=STEPS[cur];document.getElementById('sbadge').textContent=`Etapa ${cur+1} / ${STEPS.length}`;document.getElementById('sdesc').textContent=s.label;document.getElementById('prog').style.width=`${Math.round(((cur+1)/STEPS.length)*100)}%`;document.getElementById('bp').disabled=cur===0;document.getElementById('bn').disabled=cur===STEPS.length-1;document.getElementById('narr').innerHTML=s.narr;document.getElementById('preview').innerHTML=s.prev||'';}
function showCode(s){document.getElementById('code-out').innerHTML=s.code;}
function playS(){if(typing)return;typing=true;const s=STEPS[cur];const out=document.getElementById('code-out');out.innerHTML='';document.getElementById('bplay').disabled=true;document.getElementById('bp').disabled=true;document.getElementById('bn').disabled=true;const full=s.code;const stripped=full.replace(/<[^>]+>/g,'');const parts=[];let i=0,pos=0;while(i<full.length){if(full[i]==='<'){const end=full.indexOf('>',i);if(end!==-1){parts.push({type:'tag',val:full.slice(i,end+1)});i=end+1;continue;}}parts.push({type:'char',val:full[i],ch:stripped[pos]||''});pos++;i++;}
let pi=0;function tick(){if(pi>=parts.length){typing=false;document.getElementById('bplay').textContent='Rever';document.getElementById('bplay').disabled=false;document.getElementById('bn').disabled=cur===STEPS.length-1;document.getElementById('bp').disabled=false;return;}const p=parts[pi];if(p.type==='tag'){out.innerHTML+=p.val;pi++;tick();return;}out.innerHTML+=p.val;pi++;const delay=p.ch==='\n'?55:p.ch===' '?18:Math.random()*22+16;typeTimer=setTimeout(tick,delay);}tick();}
function nextS(){if(typing){clearTimeout(typeTimer);typing=false;}cur=Math.min(cur+1,STEPS.length-1);render();showCode(STEPS[cur]);document.getElementById('bplay').textContent='Rever';document.getElementById('bplay').disabled=false;}
function prevS(){if(typing){clearTimeout(typeTimer);typing=false;}cur=Math.max(cur-1,0);render();showCode(STEPS[cur]);document.getElementById('bplay').textContent='Rever';document.getElementById('bplay').disabled=false;}
render();document.getElementById('code-out').innerHTML='';document.getElementById('bplay').textContent='Iniciar digitação';
</script>
</body>
</html>
