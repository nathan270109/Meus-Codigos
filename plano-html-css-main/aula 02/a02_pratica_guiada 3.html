<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prática Guiada — CSS Fundamentos · Aula 02</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;min-height:100vh;padding:22px}
.wrap{max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:11px}
.pg-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px}
.pg-title{font-size:17px;font-weight:600}.pg-meta{font-size:12px;color:#64748b;margin-top:2px}
.pg-time{font-size:12px;font-weight:500;background:#f1f5f9;border:1px solid #e2e8f0;padding:4px 12px;border-radius:8px;color:#64748b}
.prog-row{display:flex;align-items:center;gap:9px}
.pb{flex:1;height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.pf{height:100%;background:#0284C7;border-radius:4px;transition:width .4s ease;width:0%}
.pt{font-size:12px;font-weight:600;color:#64748b;min-width:60px;text-align:right}
.steps{display:flex;flex-direction:column;gap:8px}
.sc{border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;background:#fff;transition:border-color .2s}
.sc.done{border-color:#86efac}.sc.open{border-color:#7dd3fc}
.sh{display:flex;align-items:flex-start;gap:11px;padding:12px 13px;cursor:pointer;user-select:none;transition:background .15s}
.sh:hover{background:#f8fafc}.sc.open .sh{background:#f0f9ff}
.chk{width:21px;height:21px;border-radius:6px;border:1.5px solid #cbd5e1;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .18s;cursor:pointer;background:#fff}
.chk:hover{border-color:#0284C7;background:#e0f2fe}.chk.done{background:#22c55e;border-color:#22c55e}
.chk svg{display:none}.chk.done svg{display:block}
.si{flex:1}.sn{font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.st{font-size:13px;font-weight:600;color:#1e293b;line-height:1.3}.stm{font-size:11px;color:#94a3b8;margin-top:2px}
.cv{color:#94a3b8;font-size:11px;margin-top:4px;transition:transform .22s;flex-shrink:0}
.sc.open .cv{transform:rotate(180deg)}
.sb2{max-height:0;overflow:hidden;transition:max-height .35s ease}
.sc.open .sb2{max-height:1400px}
.sbi{padding:0 13px 14px;border-top:1px solid #f1f5f9}
.il{display:flex;flex-direction:column;gap:6px;margin:11px 0}
.ii{display:flex;gap:9px;font-size:13px;color:#475569;line-height:1.55;align-items:flex-start}
.in{width:19px;height:19px;min-width:19px;border-radius:5px;background:#e0f2fe;color:#0284C7;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
code{font-family:'Courier New',monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
.cb2{background:#1e293b;border-radius:8px;padding:12px 15px;font-family:'Courier New',monospace;font-size:12px;line-height:1.8;color:#94a3b8;margin:9px 0;overflow-x:auto;white-space:pre}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.c{color:#475569;font-style:italic}
.tip{background:#f0f9ff;border-left:3px solid #0284C7;padding:8px 12px;font-size:12px;color:#0c4a6e;line-height:1.5;margin-top:8px}
.tip strong{color:#075985;font-weight:600}
.mb{display:inline-flex;align-items:center;gap:5px;background:#f8fafc;border:1px solid #cbd5e1;color:#64748b;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s;margin-top:10px}
.mb:hover{background:#f0fdf4;color:#15803d;border-color:#86efac}
.mb.done-btn{background:#f0fdf4;color:#15803d;border-color:#86efac;pointer-events:none}
.success{background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:18px;text-align:center;display:none}
.success.show{display:block}
.success h3{font-size:15px;font-weight:600;color:#15803d;margin-bottom:5px}
.success p{font-size:13px;color:#475569}
</style>
</head>
<body>
<div class="wrap">
  <div class="pg-header">
    <div><div class="pg-title">Prática guiada — CSS Fundamentos</div><div class="pg-meta">Siga os passos. Marque cada um quando terminar.</div></div>
    <span class="pg-time">60 min disponíveis</span>
  </div>
  <div class="prog-row"><div class="pb"><div class="pf" id="pf"></div></div><div class="pt" id="pt">0 / 7</div></div>
  <div class="steps" id="steps"></div>
  <div class="success" id="success"><h3>Parabéns! CSS da Aula 02 concluído.</h3><p>Sua página agora tem estilo profissional. Hora do desafio autônomo!</p></div>
</div>
<script>
const STEPS=[
{title:"Criar a estrutura de pastas e o arquivo CSS",time:"5 min",
instrs:["Dentro da pasta <code>meu-site</code>, crie a subpasta <code>css/</code>","Dentro de <code>css/</code>, crie o arquivo <code>estilos.css</code>","No <code>&lt;head&gt;</code> do <code>index.html</code>, adicione o link: <code>&lt;link rel=\"stylesheet\" href=\"css/estilos.css\"&gt;</code>","Salve ambos os arquivos e confirme que o Live Server ainda funciona"],
code:"",tip:"<strong>Dica:</strong> ao salvar o CSS, o Live Server atualiza o browser automaticamente — você verá as mudanças em tempo real."},
{title:"Reset global e estilos base do body",time:"8 min",
instrs:["Abra <code>estilos.css</code> e comece com o reset global usando <code>*</code>","Adicione <code>box-sizing: border-box</code>, <code>margin: 0</code> e <code>padding: 0</code> para o seletor <code>*</code>","Estilize o <code>body</code>: escolha uma <code>font-family</code>, defina <code>font-size: 16px</code>, <code>line-height: 1.6</code> e uma <code>color</code> escura","Adicione uma <code>background-color</code> levemente cinza ao body"],
code:`<span class="c">/* Reset e base */</span>
<span class="k">*</span>, <span class="k">*::before</span>, <span class="k">*::after</span> {
  <span class="p">box-sizing</span>: <span class="v">border-box</span>;
  <span class="p">margin</span>: <span class="v">0</span>;
  <span class="p">padding</span>: <span class="v">0</span>;
}
<span class="k">body</span> {
  <span class="p">font-family</span>: <span class="s">'Segoe UI', Arial, sans-serif</span>;
  <span class="p">font-size</span>: <span class="v">16px</span>;
  <span class="p">line-height</span>: <span class="v">1.6</span>;
  <span class="p">color</span>: <span class="v">#1e293b</span>;
  <span class="p">background-color</span>: <span class="v">#f8fafc</span>;
}`,tip:"<strong>Lembre:</strong> o reset garante comportamento igual em todos os browsers. Sempre comece qualquer projeto CSS com isso."},
{title:"Estilizar header e h1",time:"8 min",
instrs:["Selecione <code>header</code> e adicione <code>background-color</code> com uma cor de destaque","Mude a <code>color</code> do header para <code>white</code> e centralize o texto com <code>text-align: center</code>","Adicione <code>padding: 40px 20px</code> ao header","Estilize <code>header h1</code>: aumente o <code>font-size</code> e adicione <code>margin-bottom</code>"],
code:`<span class="k">header</span> {
  <span class="p">background-color</span>: <span class="v">#2563eb</span>; <span class="c">/* sua cor primária */</span>
  <span class="p">color</span>: <span class="v">white</span>;
  <span class="p">text-align</span>: <span class="v">center</span>;
  <span class="p">padding</span>: <span class="v">40px 20px</span>;
}
<span class="k">header h1</span> {
  <span class="p">font-size</span>: <span class="v">2.2rem</span>;
  <span class="p">font-weight</span>: <span class="v">700</span>;
  <span class="p">margin-bottom</span>: <span class="v">8px</span>;
}`,tip:"<strong>Dica:</strong> use o Coolors.co para escolher sua paleta de cores. Defina no máximo 3 cores: primária, secundária e destaque."},
{title:"Estilizar nav e links",time:"8 min",
instrs:["Adicione um <code>background-color</code> mais escuro ao <code>nav</code> e <code>padding: 8px 16px</code>","Estilize <code>nav a</code>: remova o sublinhado (<code>text-decoration: none</code>), mude a cor para <code>white</code>","Adicione <code>padding: 8px 16px</code> nos links e <code>border-radius: 6px</code>","Crie o efeito <code>nav a:hover</code> com <code>background: rgba(255,255,255,.15)</code> e <code>transition: background .2s</code>"],
code:`<span class="k">nav</span> {
  <span class="p">background-color</span>: <span class="v">#1d4ed8</span>;
  <span class="p">padding</span>: <span class="v">8px 16px</span>;
}
<span class="k">nav a</span> {
  <span class="p">color</span>: <span class="v">white</span>;
  <span class="p">text-decoration</span>: <span class="v">none</span>;
  <span class="p">padding</span>: <span class="v">8px 16px</span>;
  <span class="p">border-radius</span>: <span class="v">6px</span>;
  <span class="p">font-weight</span>: <span class="v">600</span>;
  <span class="p">transition</span>: <span class="v">background .2s</span>;
}
<span class="k">nav a:hover</span> {
  <span class="p">background</span>: <span class="v">rgba(255,255,255,.15)</span>;
}`,tip:"<strong>Importante:</strong> sempre adicione <code>transition</code> ANTES do <code>:hover</code>, no elemento base. Caso contrário a animação só funciona em uma direção."},
{title:"Estilizar main, sections e h2",time:"10 min",
instrs:["Adicione ao <code>main</code>: <code>max-width: 800px</code> + <code>margin: 0 auto</code> + <code>padding: 40px 20px</code>","Crie estilos para <code>section</code> com <code>margin-bottom: 32px</code>","Estilize todos os <code>h2</code>: tamanho, cor e adicione <code>border-left: 4px solid</code> na sua cor primária com <code>padding-left: 12px</code>","Estilize os parágrafos: <code>color</code> levemente mais clara e <code>margin-bottom: 12px</code>"],
code:`<span class="k">main</span> {
  <span class="p">max-width</span>: <span class="v">800px</span>;
  <span class="p">margin</span>: <span class="v">0 auto</span>;
  <span class="p">padding</span>: <span class="v">40px 20px</span>;
}
<span class="k">section</span> { <span class="p">margin-bottom</span>: <span class="v">32px</span>; }
<span class="k">h2</span> {
  <span class="p">font-size</span>: <span class="v">1.4rem</span>;
  <span class="p">font-weight</span>: <span class="v">700</span>;
  <span class="p">color</span>: <span class="v">#2563eb</span>;
  <span class="p">border-left</span>: <span class="v">4px solid #2563eb</span>;
  <span class="p">padding-left</span>: <span class="v">12px</span>;
  <span class="p">margin-bottom</span>: <span class="v">12px</span>;
}
<span class="k">p</span> { <span class="p">color</span>: <span class="v">#475569</span>; <span class="p">margin-bottom</span>: <span class="v">12px</span>; }`,tip:"<strong>max-width + margin: 0 auto</strong> é um dos padrões mais usados em CSS. Limita a largura e centraliza horizontalmente."},
{title:"Estilizar listas e links do conteúdo",time:"8 min",
instrs:["Para <code>ul</code>: <code>list-style: none</code> e <code>padding: 0</code>","Para <code>ul li</code>: <code>padding: 8px 0 8px 20px</code> e <code>border-bottom: 1px solid #e2e8f0</code>","Para <code>ul li::before</code>: <code>content: '›'</code>, posição <code>absolute</code>, <code>left: 0</code> e cor primária","Para links no <code>main</code>: cor e <code>transition: color .2s</code> com efeito <code>:hover</code>"],
code:`<span class="k">ul</span> { <span class="p">list-style</span>: <span class="v">none</span>; <span class="p">padding</span>: <span class="v">0</span>; }
<span class="k">ul li</span> {
  <span class="p">padding</span>: <span class="v">8px 0 8px 20px</span>;
  <span class="p">border-bottom</span>: <span class="v">1px solid #e2e8f0</span>;
  <span class="p">position</span>: <span class="v">relative</span>;
  <span class="p">color</span>: <span class="v">#475569</span>;
}
<span class="k">ul li::before</span> {
  <span class="p">content</span>: <span class="s">"›"</span>;
  <span class="p">color</span>: <span class="v">#2563eb</span>;
  <span class="p">position</span>: <span class="v">absolute</span>;
  <span class="p">left</span>: <span class="v">0</span>;
  <span class="p">font-weight</span>: <span class="v">700</span>;
}`,tip:"<strong>Pseudo-elemento ::before</strong> insere conteúdo visual antes do elemento sem adicionar HTML. Muito usado para marcadores personalizados e ícones."},
{title:"Footer e validação",time:"9 min",
instrs:["Estilize o <code>footer</code>: fundo escuro, texto claro, <code>text-align: center</code> e <code>padding</code> generoso","Adicione <code>margin-top: 40px</code> ao footer para separar do conteúdo","Acesse <a href='https://jigsaw.w3.org/css-validator/#validate_by_input' target='_blank' style='color:#0284C7'>jigsaw.w3.org/css-validator</a>, cole o CSS e valide","Corrija todos os erros — verifique também o HTML no validator.w3.org"],
code:`<span class="k">footer</span> {
  <span class="p">background-color</span>: <span class="v">#1e293b</span>;
  <span class="p">color</span>: <span class="v">rgba(255, 255, 255, .7)</span>;
  <span class="p">text-align</span>: <span class="v">center</span>;
  <span class="p">padding</span>: <span class="v">28px 20px</span>;
  <span class="p">font-size</span>: <span class="v">.9rem</span>;
  <span class="p">margin-top</span>: <span class="v">40px</span>;
}`,tip:"<strong>Entidades CSS úteis:</strong> <code>rgba(0,0,0,.5)</code> = preto com 50% de transparência | <code>1rem</code> = 16px | <code>1em</code> = tamanho do elemento pai."}
];
let done=new Set();
function build(){const list=document.getElementById('steps');STEPS.forEach((s,i)=>{const card=document.createElement('div');card.className='sc'+(i===0?' open':'');card.id='sc-'+i;card.innerHTML=`<div class="sh" onclick="tog(${i})"><div class="chk" id="chk-${i}" onclick="event.stopPropagation();mk(${i})"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="si"><div class="sn">Passo ${i+1} de ${STEPS.length}</div><div class="st">${s.title}</div><div class="stm">${s.time}</div></div><span class="cv">${i===0?'▲':'▼'}</span></div><div class="sb2"><div class="sbi"><div class="il">${s.instrs.map((t,j)=>`<div class="ii"><div class="in">${j+1}</div><span>${t}</span></div>`).join('')}</div>${s.code?`<div class="cb2">${s.code}</div>`:''}<div class="tip">${s.tip}</div><button class="mb" id="mb-${i}" onclick="mk(${i})"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Marcar como concluído</button></div></div>`;list.appendChild(card);});}
function tog(i){const c=document.getElementById('sc-'+i);const o=c.classList.contains('open');document.querySelectorAll('.sc').forEach(x=>{x.classList.remove('open');x.querySelector('.cv').textContent='▼';});if(!o){c.classList.add('open');c.querySelector('.cv').textContent='▲';}}
function mk(i){if(done.has(i))return;done.add(i);document.getElementById('chk-'+i).classList.add('done');document.getElementById('sc-'+i).classList.add('done');const mb=document.getElementById('mb-'+i);mb.classList.add('done-btn');mb.innerHTML='<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Concluído!';upd();if(i<STEPS.length-1){document.querySelectorAll('.sc').forEach(x=>{x.classList.remove('open');x.querySelector('.cv').textContent='▼';});const nx=document.getElementById('sc-'+(i+1));nx.classList.add('open');nx.querySelector('.cv').textContent='▲';setTimeout(()=>nx.scrollIntoView({behavior:'smooth',block:'nearest'}),100);}if(done.size===STEPS.length)document.getElementById('success').classList.add('show');}
function upd(){document.getElementById('pf').style.width=Math.round((done.size/STEPS.length)*100)+'%';document.getElementById('pt').textContent=done.size+' / '+STEPS.length;}
build();upd();
</script>
</body>
</html>
