<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exposição — Formulários & Tabelas · Aula 04</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;gap:8px;flex-wrap:wrap}
.badge{background:#7C3AED;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600}.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;font-family:"Courier New",monospace;color:#475569;min-width:64px;text-align:center}
.timer.warn{color:#d97706;background:#fffbeb}.timer.danger{color:#dc2626;background:#fef2f2}
.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#7C3AED;transform:scale(1.4)}.dot.done{background:#a78bfa;opacity:.6}
.dsep{width:10px;height:1px;background:#e2e8f0;flex-shrink:0}
.slide-wrap{flex:1;overflow:hidden;position:relative}
.slide{position:absolute;inset:0;padding:22px 28px;overflow-y:auto;display:none}
.slide.active{display:block;animation:sIn .22s ease}
@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ey{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#7C3AED;margin-bottom:5px}
.stitle{font-size:21px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:5px}
.ssub{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px}
.card.ac{border-left:3px solid #7C3AED}
.ci{font-size:18px;margin-bottom:5px}.ct{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.cb{font-size:12px;color:#64748b;line-height:1.5}
code{font-family:"Courier New",monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
.cw{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:10px 0}
.ch{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:7px 13px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:500;color:#64748b}
.cd{display:flex;gap:5px}.c1{width:10px;height:10px;border-radius:50%}
pre{background:#1e293b;color:#e2e8f0;padding:13px 16px;font-size:12px;line-height:1.8;overflow-x:auto;font-family:"Courier New",monospace;white-space:pre}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.cm{color:#475569;font-style:italic}
.hl{background:#f5f3ff;border-left:3px solid #7C3AED;padding:10px 13px;font-size:12.5px;color:#3b1f8c;line-height:1.55;margin:10px 0}
.hl strong{color:#5b21b6;font-weight:600}
.input-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin:10px 0}
.inp-card{border:1px solid #e2e8f0;border-radius:8px;padding:9px 11px;cursor:pointer;transition:all .15s;background:#fff}
.inp-card:hover{border-color:#a78bfa;background:#f5f3ff}.inp-card.on{border-color:#7C3AED;background:#ede9fe}
.inp-type{font-family:"Courier New",monospace;font-size:12px;font-weight:600;color:#7C3AED;margin-bottom:3px}
.inp-use{font-size:11px;color:#94a3b8}
.inp-prev{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px;min-height:52px;font-size:13px;color:#64748b;line-height:1.6}
.qb{margin-bottom:16px}
.qa{font-size:13.5px;font-weight:600;color:#1e293b;margin-bottom:11px;line-height:1.5}
.qo{display:flex;flex-direction:column;gap:7px}
.qop{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:9px;transition:all .15s}
.qop:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#a78bfa;background:#f5f3ff}
.qop.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.qop.dimmed{opacity:.4;pointer-events:none}
.qfb{margin-top:9px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5;display:none}
.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}
.rn{width:23px;height:23px;min-width:23px;border-radius:6px;background:#ede9fe;color:#7C3AED;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0;color:#1e293b}.nb.pr{background:#7C3AED;color:#fff;border-color:#7C3AED}
.nb.pr:hover{background:#6d28d9}.nb:disabled{opacity:.35;pointer-events:none}
.nc{font-size:12px;color:#94a3b8}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:11px">
      <span class="badge">Aula 04</span>
      <div><div class="hdr-title">Formulários & Tabelas — Exposição Dialogada</div><div class="hdr-sub">30 minutos · Projetor · Turma</div></div>
    </div>
    <div class="timer" id="timer">30:00</div>
  </div>
  <div class="dots" id="dots-bar"></div>
  <div class="slide-wrap" id="slide-wrap"></div>
  <div class="nav">
    <button class="nb" id="btn-prev" onclick="nav(-1)" disabled>← Anterior</button>
    <span class="nc" id="counter">1 / 9</span>
    <button class="nb pr" id="btn-next" onclick="nav(1)">Próximo →</button>
  </div>
</div>
<script>
const SL=[
{id:"s0",r:()=>`<div class="ey">Abertura · 3 min</div>
<div class="stitle">Formulários — a porta de entrada de dados na web</div>
<div class="ssub">Todo sistema web recebe dados do usuário. Formulários bem construídos são seguros, acessíveis e fáceis de usar.</div>
<div class="cards">
<div class="card ac"><div class="ci">📋</div><div class="ct">Por que formulários importam</div><div class="cb">Login, cadastro, busca, checkout — qualquer entrada de dados usa formulários HTML. É a fundação de toda aplicação web.</div></div>
<div class="card ac"><div class="ci">♿</div><div class="ct">Acessibilidade obrigatória</div><div class="cb">A Lei Brasileira de Inclusão (Art. 63) exige que sites sejam acessíveis. Label correto é obrigatório por lei.</div></div>
<div class="card"><div class="ci">💬</div><div class="ct">Atividade de abertura</div><div class="cb"><em>"Abram o formulário de cadastro do iFood ou Mercado Livre. Quais campos vocês identificam? Quais têm validação automática?"</em></div></div>
<div class="card"><div class="ci">🎯</div><div class="ct">O que veremos</div><div class="cb">Tag form, tipos de input, label/for, select, textarea, fieldset, validação HTML5 e tabelas semânticas.</div></div>
</div>`},
{id:"s1",r:()=>`<div class="ey">Estrutura · 3 min</div>
<div class="stitle">A tag form — estrutura mínima</div>
<div class="ssub">Todo formulário precisa de form com action e method. Sem eles o HTML não sabe para onde enviar os dados.</div>
<div class="cw"><div class="ch"><span>HTML · Formulário mínimo correto</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
<pre><span class="k">&lt;form</span>
  <span class="p">action</span>=<span class="s">"obrigado.html"</span>   <span class="cm">&lt;!-- para onde enviar --&gt;</span>
  <span class="p">method</span>=<span class="s">"post"</span>            <span class="cm">&lt;!-- POST = dados no corpo; GET = na URL --&gt;</span>
<span class="k">&gt;</span>

  <span class="cm">&lt;!-- label DEVE estar associado ao input via for/id --&gt;</span>
  <span class="k">&lt;label</span> <span class="p">for</span>=<span class="s">"nome"</span><span class="k">&gt;</span><span class="v">Nome completo</span><span class="k">&lt;/label&gt;</span>
  <span class="k">&lt;input</span>
    <span class="p">type</span>=<span class="s">"text"</span>
    <span class="p">id</span>=<span class="s">"nome"</span>
    <span class="p">name</span>=<span class="s">"nome"</span>
    <span class="p">placeholder</span>=<span class="s">"Digite seu nome"</span>
    <span class="p">required</span>
  <span class="k">&gt;</span>

  <span class="k">&lt;button</span> <span class="p">type</span>=<span class="s">"submit"</span><span class="k">&gt;</span><span class="v">Enviar</span><span class="k">&lt;/button&gt;</span>

<span class="k">&lt;/form&gt;</span></pre></div>
<div class="hl"><strong>label for + input id:</strong> o for do label deve ter exatamente o mesmo valor do id do input. Isso associa semanticamente os dois — clicar no label foca o campo. Obrigatório para acessibilidade.</div>`},
{id:"s2",r:()=>`<div class="ey">Tipos de input · 5 min</div>
<div class="stitle">Tipos de input — clique para explorar</div>
<div class="ssub">O atributo type define o comportamento e a validação do campo. Cada tipo tem validação nativa automática.</div>
<div class="input-grid">
<div class="inp-card" onclick="showInp(this,'text','Texto livre','&lt;input type=&quot;text&quot; placeholder=&quot;Seu nome&quot;&gt;','Texto de linha única. Padrão se não especificar type.')"><div class="inp-type">text</div><div class="inp-use">texto livre</div></div>
<div class="inp-card" onclick="showInp(this,'email','E-mail','&lt;input type=&quot;email&quot; placeholder=&quot;voce@email.com&quot;&gt;','Valida automaticamente o formato de e-mail. No mobile abre teclado com @ visível.')"><div class="inp-type">email</div><div class="inp-use">valida formato</div></div>
<div class="inp-card" onclick="showInp(this,'password','Senha','&lt;input type=&quot;password&quot;&gt;','Oculta os caracteres digitados. Nunca use type=text para senhas.')"><div class="inp-type">password</div><div class="inp-use">oculta texto</div></div>
<div class="inp-card" onclick="showInp(this,'number','Número','&lt;input type=&quot;number&quot; min=&quot;18&quot; max=&quot;100&quot;&gt;','Valida que é número. Atributos min e max definem o intervalo válido.')"><div class="inp-type">number</div><div class="inp-use">só números</div></div>
<div class="inp-card" onclick="showInp(this,'tel','Telefone','&lt;input type=&quot;tel&quot; placeholder=&quot;(47) 9999-0000&quot;&gt;','No mobile abre o teclado numérico. Não valida formato — use pattern para isso.')"><div class="inp-type">tel</div><div class="inp-use">teclado numérico</div></div>
<div class="inp-card" onclick="showInp(this,'date','Data','&lt;input type=&quot;date&quot;&gt;','Abre seletor de data nativo do sistema. Valor sempre no formato AAAA-MM-DD.')"><div class="inp-type">date</div><div class="inp-use">seletor de data</div></div>
<div class="inp-card" onclick="showInp(this,'radio','Opção única','&lt;input type=&quot;radio&quot; name=&quot;genero&quot; value=&quot;M&quot;&gt; Masculino','Mesmo name = mesmo grupo. Só um pode ser selecionado por vez.')"><div class="inp-type">radio</div><div class="inp-use">escolha única</div></div>
<div class="inp-card" onclick="showInp(this,'checkbox','Múltipla escolha','&lt;input type=&quot;checkbox&quot; id=&quot;termos&quot;&gt; Aceito os termos','Pode selecionar vários. Cada checkbox tem seu próprio name.')"><div class="inp-type">checkbox</div><div class="inp-use">múltipla escolha</div></div>
<div class="inp-card" onclick="showInp(this,'file','Upload de arquivo','&lt;input type=&quot;file&quot; accept=&quot;.pdf,.jpg&quot;&gt;','O atributo accept filtra os tipos de arquivo visíveis no seletor.')"><div class="inp-type">file</div><div class="inp-use">upload</div></div>
</div>
<div class="inp-prev" id="inp-prev">Clique em um tipo de input acima para ver como funciona.</div>`},
{id:"s3",r:()=>`<div class="ey">Agrupamento · 3 min</div>
<div class="stitle">fieldset, legend, select e textarea</div>
<div class="ssub">Para formulários maiores, fieldset agrupa campos relacionados. select e textarea completam os controles de formulário.</div>
<div class="cw"><div class="ch"><span>HTML · Controles avançados</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
<pre><span class="cm">&lt;!-- fieldset agrupa campos relacionados --&gt;</span>
<span class="k">&lt;fieldset&gt;</span>
  <span class="k">&lt;legend&gt;</span><span class="v">Dados pessoais</span><span class="k">&lt;/legend&gt;</span>
  <span class="cm">&lt;!-- campos aqui --&gt;</span>
<span class="k">&lt;/fieldset&gt;</span>

<span class="cm">&lt;!-- Lista suspensa --&gt;</span>
<span class="k">&lt;label</span> <span class="p">for</span>=<span class="s">"assunto"</span><span class="k">&gt;</span><span class="v">Assunto</span><span class="k">&lt;/label&gt;</span>
<span class="k">&lt;select</span> <span class="p">id</span>=<span class="s">"assunto"</span> <span class="p">name</span>=<span class="s">"assunto"</span> <span class="p">required</span><span class="k">&gt;</span>
  <span class="k">&lt;option</span> <span class="p">value</span>=<span class="s">""</span><span class="k">&gt;</span><span class="v">Selecione...</span><span class="k">&lt;/option&gt;</span>
  <span class="k">&lt;option</span> <span class="p">value</span>=<span class="s">"suporte"</span><span class="k">&gt;</span><span class="v">Suporte técnico</span><span class="k">&lt;/option&gt;</span>
  <span class="k">&lt;option</span> <span class="p">value</span>=<span class="s">"vendas"</span><span class="k">&gt;</span><span class="v">Comercial</span><span class="k">&lt;/option&gt;</span>
<span class="k">&lt;/select&gt;</span>

<span class="cm">&lt;!-- Área de texto multilinha --&gt;</span>
<span class="k">&lt;label</span> <span class="p">for</span>=<span class="s">"msg"</span><span class="k">&gt;</span><span class="v">Mensagem</span><span class="k">&lt;/label&gt;</span>
<span class="k">&lt;textarea</span>
  <span class="p">id</span>=<span class="s">"msg"</span> <span class="p">name</span>=<span class="s">"msg"</span>
  <span class="p">rows</span>=<span class="s">"5"</span>
  <span class="p">minlength</span>=<span class="s">"20"</span>
  <span class="p">placeholder</span>=<span class="s">"Descreva seu problema..."</span>
  <span class="p">required</span>
<span class="k">&gt;&lt;/textarea&gt;</span></pre></div>`},
{id:"s4",r:()=>`<div class="ey">Validação HTML5 · 3 min</div>
<div class="stitle">Validação nativa — sem JavaScript</div>
<div class="ssub">O HTML5 valida campos automaticamente quando o usuário clica em Enviar. Nenhuma linha de JavaScript necessária.</div>
<div class="cw"><div class="ch"><span>HTML · Atributos de validação</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
<pre><span class="k">&lt;input</span>
  <span class="p">type</span>=<span class="s">"text"</span>
  <span class="p">required</span>                           <span class="cm">&lt;!-- campo obrigatório --&gt;</span>
  <span class="p">minlength</span>=<span class="s">"3"</span>                     <span class="cm">&lt;!-- mínimo de caracteres --&gt;</span>
  <span class="p">maxlength</span>=<span class="s">"100"</span>                   <span class="cm">&lt;!-- máximo de caracteres --&gt;</span>
<span class="k">&gt;</span>

<span class="k">&lt;input</span>
  <span class="p">type</span>=<span class="s">"number"</span>
  <span class="p">min</span>=<span class="s">"18"</span>                          <span class="cm">&lt;!-- valor mínimo --&gt;</span>
  <span class="p">max</span>=<span class="s">"120"</span>                         <span class="cm">&lt;!-- valor máximo --&gt;</span>
<span class="k">&gt;</span>

<span class="k">&lt;input</span>
  <span class="p">type</span>=<span class="s">"text"</span>
  <span class="p">pattern</span>=<span class="s">"[0-9]{5}-[0-9]{3}"</span>      <span class="cm">&lt;!-- regex — padrão de CEP --&gt;</span>
  <span class="p">title</span>=<span class="s">"CEP no formato 00000-000"</span>  <span class="cm">&lt;!-- mensagem de erro --&gt;</span>
<span class="k">&gt;</span></pre></div>
<div class="hl"><strong>Como funciona:</strong> ao clicar em submit, o browser verifica cada campo com atributos de validação. Se algum falhar, exibe uma mensagem nativa e bloqueia o envio. Custo: zero JavaScript.</div>`},
{id:"s5",r:()=>`<div class="ey">CSS para formulários · 3 min</div>
<div class="stitle">Estilizando formulários com :focus</div>
<div class="ssub">O estado :focus indica qual campo está ativo. É essencial para acessibilidade via teclado.</div>
<div class="cw"><div class="ch"><span>CSS · Formulário estilizado</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
<pre><span class="cm">/* Estilos base dos campos */</span>
<span class="k">input, select, textarea</span> {
  <span class="p">width</span>:         <span class="v">100%</span>;
  <span class="p">padding</span>:       <span class="v">10px 14px</span>;
  <span class="p">border</span>:        <span class="v">1px solid #cbd5e1</span>;
  <span class="p">border-radius</span>: <span class="v">8px</span>;
  <span class="p">font-size</span>:     <span class="v">1rem</span>;
  <span class="p">font-family</span>:   <span class="v">inherit</span>;
  <span class="p">transition</span>:    <span class="v">border-color .2s, box-shadow .2s</span>;
  <span class="p">outline</span>:       <span class="v">none</span>;
}

<span class="cm">/* Efeito ao focar no campo */</span>
<span class="k">input:focus, select:focus, textarea:focus</span> {
  <span class="p">border-color</span>: <span class="v">#7C3AED</span>;
  <span class="p">box-shadow</span>:   <span class="v">0 0 0 3px rgba(124,58,237,.15)</span>;
}

<span class="cm">/* Campos inválidos após interação */</span>
<span class="k">input:invalid:not(:placeholder-shown)</span> {
  <span class="p">border-color</span>: <span class="v">#ef4444</span>;
}</pre></div>`},
{id:"s6",r:()=>`<div class="ey">Tabelas · 4 min</div>
<div class="stitle">Tabelas HTML — quando e como usar</div>
<div class="ssub">Tabelas são para dados tabulares — nunca para layout. Use thead, tbody, tfoot e caption para semântica completa.</div>
<div class="cw"><div class="ch"><span>HTML · Tabela semântica completa</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
<pre><span class="k">&lt;table&gt;</span>
  <span class="k">&lt;caption&gt;</span><span class="v">Horários de atendimento</span><span class="k">&lt;/caption&gt;</span>

  <span class="k">&lt;thead&gt;</span>
    <span class="k">&lt;tr&gt;</span>
      <span class="k">&lt;th&gt;</span><span class="v">Dia</span><span class="k">&lt;/th&gt;</span>
      <span class="k">&lt;th&gt;</span><span class="v">Horário</span><span class="k">&lt;/th&gt;</span>
      <span class="k">&lt;th&gt;</span><span class="v">Modalidade</span><span class="k">&lt;/th&gt;</span>
    <span class="k">&lt;/tr&gt;</span>
  <span class="k">&lt;/thead&gt;</span>

  <span class="k">&lt;tbody&gt;</span>
    <span class="k">&lt;tr&gt;</span>
      <span class="k">&lt;td&gt;</span><span class="v">Segunda a Sexta</span><span class="k">&lt;/td&gt;</span>
      <span class="k">&lt;td&gt;</span><span class="v">08h às 18h</span><span class="k">&lt;/td&gt;</span>
      <span class="k">&lt;td&gt;</span><span class="v">Presencial e Online</span><span class="k">&lt;/td&gt;</span>
    <span class="k">&lt;/tr&gt;</span>
    <span class="k">&lt;tr&gt;</span>
      <span class="k">&lt;td</span> <span class="p">colspan</span>=<span class="s">"2"</span><span class="k">&gt;</span><span class="v">Sábado</span><span class="k">&lt;/td&gt;</span>  <span class="cm">&lt;!-- mescla 2 colunas --&gt;</span>
      <span class="k">&lt;td&gt;</span><span class="v">Apenas Online</span><span class="k">&lt;/td&gt;</span>
    <span class="k">&lt;/tr&gt;</span>
  <span class="k">&lt;/tbody&gt;</span>

  <span class="k">&lt;tfoot&gt;</span>

{id:"s7",r:()=>`<div class="ey">Quiz · 3 min</div>
<div class="stitle">Verificação de aprendizagem</div>
<div class="ssub">Turma responde junto.</div>
<div class="qb"><div class="qa">1. Para associar um label a um input, qual par de atributos deve ser idêntico?</div>
<div class="qo">
<div class="qop" onclick="ans(this,'w','f0')"><span>A</span>label name + input name</div>
<div class="qop" onclick="ans(this,'c','f0')"><span>B</span>label for + input id</div>
<div class="qop" onclick="ans(this,'w','f0')"><span>C</span>label class + input class</div>
<div class="qop" onclick="ans(this,'w','f0')"><span>D</span>label id + input name</div>
</div><div class="qfb" id="f0" style="background:#f0fdf4;color:#15803d">Correto! O valor do atributo for do label deve ser idêntico ao id do input. É isso que cria a associação semântica.</div></div>
<div class="qb"><div class="qa">2. O atributo <code>required</code> em um input faz o quê?</div>
<div class="qo">
<div class="qop" onclick="ans(this,'w','f1')"><span>A</span>Deixa o campo vermelho automaticamente</div>
<div class="qop" onclick="ans(this,'c','f1')"><span>B</span>Bloqueia o envio do formulário se o campo estiver vazio</div>
<div class="qop" onclick="ans(this,'w','f1')"><span>C</span>Adiciona um asterisco (*) ao label</div>
<div class="qop" onclick="ans(this,'w','f1')"><span>D</span>Deixa o campo obrigatório somente no mobile</div>
</div><div class="qfb" id="f1" style="background:#f0fdf4;color:#15803d">Correto! required é validação HTML5 nativa. Ao clicar em submit, o browser bloqueia o envio e exibe uma mensagem se o campo estiver vazio.</div></div>`},
{id:"s8",r:()=>`<div class="ey">Encerramento · 1 min</div>
<div class="stitle">Recapitulando</div>
<div class="ssub">O que aprendemos e o que fazemos agora.</div>
<div class="rl">
<div class="ri"><div class="rn">1</div><div class="rt"><strong>form com action + method.</strong> label for deve ser igual ao input id — sempre.</div></div>
<div class="ri"><div class="rn">2</div><div class="rt"><strong>Tipos de input</strong> definem comportamento e validação automática. Use o tipo certo para cada dado.</div></div>
<div class="ri"><div class="rn">3</div><div class="rt"><strong>fieldset + legend</strong> agrupam campos relacionados. select + textarea completam os controles.</div></div>
<div class="ri"><div class="rn">4</div><div class="rt"><strong>Validação HTML5</strong> (required, minlength, pattern) funciona sem JavaScript.</div></div>
<div class="ri"><div class="rn">5</div><div class="rt"><strong>Tabelas</strong> são para dados tabulares. Sempre com thead, tbody e caption.</div></div>
</div>
<div class="hl"><strong>Próximo passo:</strong> criar ao vivo a página contato.html com formulário completo e tabela de horários.</div>`}
];
let cur=0,ts=false,ti=null;
function bd(){const b=document.getElementById("dots-bar");SL.forEach((s,i)=>{const d=document.createElement("span");d.className="dot"+(i===0?" active":"");d.onclick=()=>gt(i);b.appendChild(d);if(i<SL.length-1){const sep=document.createElement("div");sep.className="dsep";b.appendChild(sep);}});}
function bs(){const w=document.getElementById("slide-wrap");SL.forEach((s,i)=>{const d=document.createElement("div");d.className="slide"+(i===0?" active":"");d.id="sl-"+s.id;d.innerHTML=s.r();w.appendChild(d);});}
function gt(i){const p=cur;document.getElementById("sl-"+SL[p].id).classList.remove("active");const dots=document.querySelectorAll(".dot");dots[p].classList.remove("active");if(i>p)dots[p].classList.add("done");cur=i;const el=document.getElementById("sl-"+SL[cur].id);el.innerHTML=SL[cur].r();el.classList.add("active");dots[cur].classList.add("active");dots[cur].classList.remove("done");document.getElementById("btn-prev").disabled=cur===0;const bn=document.getElementById("btn-next");bn.disabled=cur===SL.length-1;bn.textContent=cur===SL.length-1?"Finalizar":"Próximo →";document.getElementById("counter").textContent=(cur+1)+" / "+SL.length;if(!ts){ts=true;st();}}
function nav(d){const ni=cur+d;if(ni>=0&&ni<SL.length)gt(ni);}
function st(){let r=30*60;const el=document.getElementById("timer");ti=setInterval(()=>{r--;const m=Math.floor(r/60),s=r%60;el.textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;if(r<=300)el.className="timer warn";if(r<=60)el.className="timer danger";if(r<=0){clearInterval(ti);el.textContent="00:00";}},1000);}
function showInp(el,tipo,desc,ex,info){document.querySelectorAll(".inp-card").forEach(c=>c.classList.remove("on"));el.classList.add("on");document.getElementById("inp-prev").innerHTML="<strong style='color:#7C3AED'>type=\""+tipo+"\"</strong> — "+desc+"<br><code style='display:block;margin:4px 0;font-size:11px'>"+ex+"</code>"+info;}
function ans(el,t,id){const b=el.closest(".qb");b.querySelectorAll(".qop").forEach(o=>{if(o===el)o.classList.add(t==="c"?"correct":"wrong");else o.classList.add("dimmed");});const fb=document.getElementById(id);if(t!=="c"){fb.style.background="#fef2f2";fb.style.color="#dc2626";fb.textContent="Não exatamente — pense na associação semântica entre label e input.";}fb.style.display="block";}
bd();bs();document.getElementById("btn-prev").disabled=true;
<\/script>
