<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exposição — Imagens & Links · Aula 03</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;gap:8px;flex-wrap:wrap}
.badge{background:#0D9488;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600}.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;font-family:'Courier New',monospace;color:#475569;min-width:64px;text-align:center}
.timer.warn{color:#d97706;background:#fffbeb}.timer.danger{color:#dc2626;background:#fef2f2}
.dots{display:flex;align-items:center;gap:5px;padding:9px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#0D9488;transform:scale(1.4)}.dot.done{background:#5eead4;opacity:.6}
.dsep{width:10px;height:1px;background:#e2e8f0;flex-shrink:0}
.slide-wrap{flex:1;overflow:hidden;position:relative}
.slide{position:absolute;inset:0;padding:22px 28px;overflow-y:auto;display:none}
.slide.active{display:block;animation:sIn .22s ease}
@keyframes sIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ey{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#0D9488;margin-bottom:5px}
.stitle{font-size:21px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:5px}
.ssub{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:13px 15px}
.card.ac{border-left:3px solid #0D9488}
.ci{font-size:18px;margin-bottom:5px}.ct{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.cb{font-size:12px;color:#64748b;line-height:1.5}
code{font-family:'Courier New',monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
.cw{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:10px 0}
.ch{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:7px 13px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:500;color:#64748b}
.cd{display:flex;gap:5px}.c1{width:10px;height:10px;border-radius:50%}
pre{background:#1e293b;color:#e2e8f0;padding:13px 16px;font-size:12px;line-height:1.8;overflow-x:auto;font-family:'Courier New',monospace;white-space:pre}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.cm{color:#475569;font-style:italic}
.hl{background:#f0fdfa;border-left:3px solid #0D9488;padding:10px 13px;font-size:12.5px;color:#134e4a;line-height:1.55;margin:10px 0}
.hl strong{color:#0f766e;font-weight:600}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:540px){.compare{grid-template-columns:1fr}}
.cs{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.csh{padding:8px 13px;font-size:12px;font-weight:600}.csb{padding:10px 13px;font-size:12px;color:#64748b;line-height:1.65}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:10px}
.si{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .15s}
.si:hover{border-color:#5eead4;background:#f0fdfa}.si.on{border-color:#0D9488;background:#ccfbf1}
.sc2{font-family:'Courier New',monospace;font-size:12px;font-weight:600;color:#0D9488;margin-bottom:3px}
.sn2{font-size:11px;color:#94a3b8}
.sp{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:11px 13px;min-height:50px;font-size:13px;color:#64748b;line-height:1.6}
.qb{margin-bottom:16px}
.qa{font-size:13.5px;font-weight:600;color:#1e293b;margin-bottom:11px;line-height:1.5}
.qo{display:flex;flex-direction:column;gap:7px}
.qop{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:9px 13px;font-size:13px;color:#1e293b;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:9px}
.qop:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#5eead4;background:#f0fdfa}
.qop.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.qop.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.qop.dimmed{opacity:.4;pointer-events:none}
.qfb{margin-top:9px;padding:9px 13px;border-radius:8px;font-size:12.5px;line-height:1.5;display:none}
.rl{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.ri{display:flex;gap:11px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px}
.rn{width:23px;height:23px;min-width:23px;border-radius:6px;background:#ccfbf1;color:#0D9488;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.rt{font-size:13px;color:#64748b;line-height:1.55}.rt strong{color:#1e293b;font-weight:600}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nb{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 17px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:#e2e8f0;color:#1e293b}.nb.pr{background:#0D9488;color:#fff;border-color:#0D9488}
.nb.pr:hover{background:#0f766e}.nb:disabled{opacity:.35;pointer-events:none}
.nc{font-size:12px;color:#94a3b8}
.fmt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:12px}
.fmt{border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;text-align:center;background:#fff}
.fmt-name{font-size:13px;font-weight:600;color:#0D9488;margin-bottom:3px;font-family:'Courier New',monospace}
.fmt-use{font-size:11px;color:#64748b;margin-bottom:4px}
.fmt-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:9px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:11px">
      <span class="badge">Aula 03</span>
      <div><div class="hdr-title">Imagens & Links — Exposição Dialogada</div><div class="hdr-sub">30 minutos · Projetor · Turma</div></div>
    </div>
    <div class="timer" id="timer">30:00</div>
  </div>
  <div class="dots" id="dots-bar"></div>
  <div class="slide-wrap" id="slide-wrap"></div>
  <div class="nav">
    <button class="nb" id="btn-prev" onclick="nav(-1)" disabled>← Anterior</button>
    <span class="nc" id="counter">1 / 9</span>
    <button class="nb pr" id="btn-next" onclick="nav(1)">Próximo →</button>
  </div>
</div>
<script>
const SL=[
{id:'s0',r:()=>`<div class="ey">Abertura · 3 min</div>
<div class="stitle">Imagens e links — a web ganha vida</div>
<div class="ssub">Na aula passada demos cor e estilo. Hoje aprendemos a enriquecer páginas com imagens otimizadas e todos os tipos de link.</div>
<div class="cards">
<div class="card ac"><div class="ci">🖼️</div><div class="ct">Por que imagens importam</div><div class="cb">Imagens comunicam em milissegundos. Uma boa foto aumenta conversão, engajamento e credibilidade.</div></div>
<div class="card ac"><div class="ci">⚡</div><div class="ct">Performance é obrigatório</div><div class="cb">Cada 1 segundo a mais de carregamento pode custar até 7% de conversões. Imagens pesadas = site lento.</div></div>
<div class="card"><div class="ci">💬</div><div class="ct">Atividade de abertura</div><div class="cb"><em>"Abram um site qualquer no DevTools (F12 → Network → Img). Qual é o tamanho das imagens? Alguma passa de 1MB?"</em></div></div>
<div class="card"><div class="ci">🎯</div><div class="ct">O que veremos</div><div class="cb">Tag img com atributos obrigatórios, formatos de imagem, figure/figcaption, todos os tipos de link e CSS para imagens.</div></div>
</div>`},
{id:'s1',r:()=>`<div class="ey">Conceito central · 4 min</div>
<div class="stitle">Tag img — os 4 atributos obrigatórios</div>
<div class="ssub">Uma imagem sem todos esses atributos está incompleta — prejudica acessibilidade, SEO e performance.</div>
<div class="cw"><div class="ch"><span>HTML · Imagem correta</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
<pre><span class="cm">&lt;!-- ✓ CORRETO — todos os atributos --&gt;</span>
<span class="k">&lt;img</span>
  <span class="p">src</span>=<span class="s">"img/foto-perfil.jpg"</span>       <span class="cm">&lt;!-- onde está o arquivo --&gt;</span>
  <span class="p">alt</span>=<span class="s">"Ana Lima sorrindo no jardim"</span> <span class="cm">&lt;!-- descrição para leitores de tela --&gt;</span>
  <span class="p">width</span>=<span class="s">"400"</span>                     <span class="cm">&lt;!-- evita layout shift --&gt;</span>
  <span class="p">height</span>=<span class="s">"300"</span>                    <span class="cm">&lt;!-- proporcão reservada --&gt;</span>
  <span class="p">loading</span>=<span class="s">"lazy"</span>                  <span class="cm">&lt;!-- carrega só quando necessário --&gt;</span>
<span class="k">&gt;</span>

<span class="cm">&lt;!-- ✗ ERRADO — sem alt e sem dimensões --&gt;</span>
<span class="k">&lt;img</span> <span class="p">src</span>=<span class="s">"foto.jpg"</span><span class="k">&gt;</span></pre></div>
<div class="hl"><strong>Regra de ouro do alt:</strong> descreva como você descreveria para alguém que não pode ver. Se a imagem for puramente decorativa, use <code>alt=""</code> — o leitor de tela a ignora.</div>`},
{id:'s2',r:()=>`<div class="ey">Semântica · 3 min</div>
<div class="stitle">figure e figcaption</div>
<div class="ssub">A tag <code>&lt;figure&gt;</code> agrupa semanticamente uma imagem com sua legenda. É o padrão correto para imagens com descrição.</div>
<div class="compare">
<div class="cs"><div class="csh" style="background:#fef2f2;color:#dc2626">❌ Sem semântica</div><div class="csb"><code>&lt;div class="imagem"&gt;</code><br><code>&nbsp;&nbsp;&lt;img src="p1.jpg" alt="..."&gt;</code><br><code>&nbsp;&nbsp;&lt;p&gt;Projeto 1&lt;/p&gt;</code><br><code>&lt;/div&gt;</code><br><br>O browser não sabe a relação entre a imagem e o parágrafo.</div></div>
<div class="cs"><div class="csh" style="background:#f0fdf4;color:#15803d">✓ Com semântica</div><div class="csb"><code>&lt;figure&gt;</code><br><code>&nbsp;&nbsp;&lt;img src="p1.jpg" alt="..." loading="lazy"&gt;</code><br><code>&nbsp;&nbsp;&lt;figcaption&gt;Projeto 1&lt;/figcaption&gt;</code><br><code>&lt;/figure&gt;</code><br><br>O browser entende que o figcaption é a legenda da imagem.</div></div>
</div>
<div class="hl"><strong>Benefício no Google:</strong> o figcaption é indexado como texto associado à imagem. Ajuda no Google Images e no SEO geral da página.</div>`},
{id:'s3',r:()=>`<div class="ey">Formatos · 4 min</div>
<div class="stitle">Qual formato de imagem usar?</div>
<div class="ssub">A escolha errada pode triplicar o tamanho do arquivo sem ganho visual. Conheça as diferenças.</div>
<div class="fmt-grid">
<div class="fmt"><div class="fmt-name">JPG</div><div class="fmt-use">Fotos e imagens complexas</div><div class="fmt-tag" style="background:#fef3c7;color:#92400e">compressão com perda</div></div>
<div class="fmt"><div class="fmt-name">PNG</div><div class="fmt-use">Logos com transparência</div><div class="fmt-tag" style="background:#e0f2fe;color:#075985">sem perda de qualidade</div></div>
<div class="fmt"><div class="fmt-name">WebP</div><div class="fmt-use">Tudo — padrão moderno</div><div class="fmt-tag" style="background:#f0fdf4;color:#15803d">30% menor que JPG</div></div>
<div class="fmt"><div class="fmt-name">SVG</div><div class="fmt-use">Ícones e ilustrações</div><div class="fmt-tag" style="background:#ede9fe;color:#5b21b6">vetorial, qualquer tamanho</div></div>
<div class="fmt"><div class="fmt-name">GIF</div><div class="fmt-use">Animações simples</div><div class="fmt-tag" style="background:#fce7f3;color:#9d174d">use MP4 quando possível</div></div>
</div>
<div class="hl"><strong>Ferramenta obrigatória:</strong> <code>squoosh.app</code> — comprime imagens gratuitamente no browser. Meta: abaixo de 300KB por imagem.</div>
<div class="cards" style="grid-template-columns:1fr 1fr">
<div class="card ac"><div class="ct">Foto de perfil</div><div class="cb">Prefira WebP. Se não puder: JPG. Nunca PNG para fotos.</div></div>
<div class="card ac"><div class="ct">Logo da empresa</div><div class="cb">SVG sempre que possível. PNG como fallback com fundo transparente.</div></div>
</div>`},
{id:'s4',r:()=>`<div class="ey">Prática interativa · 5 min</div>
<div class="stitle">Tipos de link — clique para explorar</div>
<div class="ssub">Além de <code>href="pagina.html"</code>, o HTML tem links especiais para casos específicos. Clique em cada um.</div>
<div class="sg">
<div class="si" onclick="showLnk(this,'Link externo','&lt;a href=&quot;https://...&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;&gt;','Abre em nova aba. SEMPRE adicione rel=&quot;noopener&quot; — segurança obrigatória para links externos. Sem ele, o site destino pode acessar window.opener da sua página.')"><div class="sc2">externo</div><div class="sn2">outra janela</div></div>
<div class="si" onclick="showLnk(this,'Link interno','&lt;a href=&quot;sobre.html&quot;&gt;','Navega para outra página do mesmo site. Use caminhos relativos — mais fácil de mover o projeto sem quebrar links.')"><div class="sc2">interno</div><div class="sn2">mesma janela</div></div>
<div class="si" onclick="showLnk(this,'Âncora (mesma página)','&lt;a href=&quot;#galeria&quot;&gt;','Rola a página até o elemento com id=&quot;galeria&quot;. Essencial para menus de navegação em sites de uma só página (landing pages).')"><div class="sc2">#âncora</div><div class="sn2">rola a página</div></div>
<div class="si" onclick="showLnk(this,'Link de e-mail','&lt;a href=&quot;mailto:contato@site.com&quot;&gt;','Abre o cliente de e-mail padrão do usuário (Outlook, Gmail, Apple Mail). Funciona no celular e desktop.')"><div class="sc2">mailto:</div><div class="sn2">abre e-mail</div></div>
<div class="si" onclick="showLnk(this,'Link de telefone','&lt;a href=&quot;tel:+5511999999999&quot;&gt;','No celular, abre o discador diretamente. No desktop, pode abrir Skype ou FaceTime. Use o número completo com DDI.')"><div class="sc2">tel:</div><div class="sn2">abre discador</div></div>
<div class="si" onclick="showLnk(this,'Link de download','&lt;a href=&quot;arquivo.pdf&quot; download&gt;','Força o download em vez de abrir no browser. O atributo download opcional define o nome do arquivo baixado.')"><div class="sc2">download</div><div class="sn2">força download</div></div>
</div>
<div class="sp" id="lnk-prev">Clique em um tipo de link acima para ver como funciona.</div>`},
{id:'s5',r:()=>`<div class="ey">CSS para imagens · 3 min</div>
<div class="stitle">object-fit e background-image</div>
<div class="ssub">Duas técnicas fundamentais para trabalhar com imagens em CSS sem distorção.</div>
<div class="cw"><div class="ch"><span>CSS · Técnicas essenciais</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
<pre><span class="cm">/* object-fit: preenche container sem distorcer */</span>
<span class="k">.galeria-img</span> {
  <span class="p">width</span>:       <span class="v">100%</span>;
  <span class="p">height</span>:      <span class="v">220px</span>;
  <span class="p">object-fit</span>:  <span class="v">cover</span>;    <span class="cm">/* cobre, corta as bordas */</span>
  <span class="p">object-fit</span>:  <span class="v">contain</span>;  <span class="cm">/* mantém tudo visível */</span>
  <span class="p">border-radius</span>: <span class="v">8px</span>;
}

<span class="cm">/* Hero com background-image */</span>
<span class="k">.hero</span> {
  <span class="p">background-image</span>:    <span class="v">url('img/capa.jpg')</span>;
  <span class="p">background-size</span>:     <span class="v">cover</span>;
  <span class="p">background-position</span>: <span class="v">center</span>;
  <span class="p">height</span>: <span class="v">400px</span>;
  <span class="p">display</span>: <span class="v">flex</span>;
  <span class="p">align-items</span>: <span class="v">center</span>;
  <span class="p">justify-content</span>: <span class="v">center</span>;
  <span class="p">color</span>: <span class="v">white</span>;
}

<span class="cm">/* Hover suave em galeria */</span>
<span class="k">figure:hover img</span> {
  <span class="p">opacity</span>:   <span class="v">0.85</span>;
  <span class="p">transform</span>: <span class="v">scale(1.04)</span>;
  <span class="p">transition</span>: <span class="v">all .3s ease</span>;
}</pre></div>`},
{id:'s6',r:()=>`<div class="ey">Font Awesome · 2 min</div>
<div class="stitle">Ícones com Font Awesome CDN</div>
<div class="ssub">Mais de 2000 ícones gratuitos prontos para usar — sem instalação, apenas um link no head.</div>
<div class="cw"><div class="ch"><span>HTML · Font Awesome via CDN</span><div class="cd"><div class="c1" style="background:#ef4444"></div><div class="c1" style="background:#f59e0b"></div><div class="c1" style="background:#10b981"></div></div></div>
<pre><span class="cm">&lt;!-- 1. Adicionar no &lt;head&gt; --&gt;</span>
<span class="k">&lt;link</span> <span class="p">rel</span>=<span class="s">"stylesheet"</span>
  <span class="p">href</span>=<span class="s">"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"</span>
<span class="k">&gt;</span>

<span class="cm">&lt;!-- 2. Usar no HTML com classes específicas --&gt;</span>
<span class="k">&lt;a</span> <span class="p">href</span>=<span class="s">"https://github.com"</span> <span class="p">target</span>=<span class="s">"_blank"</span> <span class="p">rel</span>=<span class="s">"noopener"</span><span class="k">&gt;</span>
  <span class="k">&lt;i</span> <span class="p">class</span>=<span class="s">"fa-brands fa-github"</span><span class="k">&gt;&lt;/i&gt;</span> GitHub
<span class="k">&lt;/a&gt;</span>

<span class="k">&lt;a</span> <span class="p">href</span>=<span class="s">"mailto:eu@site.com"</span><span class="k">&gt;</span>
  <span class="k">&lt;i</span> <span class="p">class</span>=<span class="s">"fa-solid fa-envelope"</span><span class="k">&gt;&lt;/i&gt;</span> E-mail
<span class="k">&lt;/a&gt;</span>

<span class="k">&lt;a</span> <span class="p">href</span>=<span class="s">"tel:+55119999"</span><span class="k">&gt;</span>
  <span class="k">&lt;i</span> <span class="p">class</span>=<span class="s">"fa-solid fa-phone"</span><span class="k">&gt;&lt;/i&gt;</span> Ligar
<span class="k">&lt;/a&gt;</span></pre></div>
<div class="hl"><strong>Pesquisar ícones:</strong> acesse <code>fontawesome.com/icons</code> — filtre por "free" para ver somente os gratuitos. Use fa-brands para logos de redes sociais.</div>`},
{id:'s7',r:()=>`<div class="ey">Quiz · 3 min</div>
<div class="stitle">Verificação de aprendizagem</div>
<div class="ssub">Turma responde junto — sem pressão.</div>
<div class="qb"><div class="qa">1. Um link externo abre em nova aba. Além de <code>target="_blank"</code>, qual atributo é obrigatório por segurança?</div>
<div class="qo">
<div class="qop" onclick="ans(this,'w','f0')"><span>A</span>href="https://..."</div>
<div class="qop" onclick="ans(this,'w','f0')"><span>B</span>class="externo"</div>
<div class="qop" onclick="ans(this,'c','f0')"><span>C</span>rel="noopener"</div>
<div class="qop" onclick="ans(this,'w','f0')"><span>D</span>type="link"</div>
</div><div class="qfb" id="f0" style="background:#f0fdf4;color:#15803d">Correto! Sem rel="noopener", o site destino pode acessar window.opener da sua página — uma brecha de segurança real.</div></div>
<div class="qb"><div class="qa">2. Qual a diferença entre <code>object-fit: cover</code> e <code>object-fit: contain</code>?</div>
<div class="qo">
<div class="qop" onclick="ans(this,'w','f1')"><span>A</span>cover é maior, contain é menor</div>
<div class="qop" onclick="ans(this,'c','f1')"><span>B</span>cover preenche e corta; contain mostra tudo sem cortar</div>
<div class="qop" onclick="ans(this,'w','f1')"><span>C</span>Não há diferença prática entre eles</div>

let cur=0,ts=false,ti=null;
function bd(){const b=document.getElementById('dots-bar');SL.forEach((s,i)=>{const d=document.createElement('span');d.className='dot'+(i===0?' active':'');d.onclick=()=>gt(i);b.appendChild(d);if(i<SL.length-1){const sep=document.createElement('div');sep.className='dsep';b.appendChild(sep);}});}
function bs(){const w=document.getElementById('slide-wrap');SL.forEach((s,i)=>{const d=document.createElement('div');d.className='slide'+(i===0?' active':'');d.id='sl-'+s.id;d.innerHTML=s.r();w.appendChild(d);});}
function gt(i){const p=cur;document.getElementById('sl-'+SL[p].id).classList.remove('active');const dots=document.querySelectorAll('.dot');dots[p].classList.remove('active');if(i>p)dots[p].classList.add('done');cur=i;const el=document.getElementById('sl-'+SL[cur].id);el.innerHTML=SL[cur].r();el.classList.add('active');dots[cur].classList.add('active');dots[cur].classList.remove('done');document.getElementById('btn-prev').disabled=cur===0;const bn=document.getElementById('btn-next');bn.disabled=cur===SL.length-1;bn.textContent=cur===SL.length-1?'Finalizar':'Próximo →';document.getElementById('counter').textContent=(cur+1)+' / '+SL.length;if(!ts){ts=true;st();}}
function nav(d){const ni=cur+d;if(ni>=0&&ni<SL.length)gt(ni);}
function st(){let r=30*60;const el=document.getElementById('timer');ti=setInterval(()=>{r--;const m=Math.floor(r/60),s=r%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(r<=300)el.className='timer warn';if(r<=60)el.className='timer danger';if(r<=0){clearInterval(ti);el.textContent='00:00';}},1000);}
function showLnk(el,titulo,ex,desc){document.querySelectorAll('.si').forEach(c=>c.classList.remove('on'));el.classList.add('on');document.getElementById('lnk-prev').innerHTML='<strong style="color:#0D9488">'+titulo+'</strong><br><code style="display:block;margin:4px 0;font-size:11px">'+ex+'</code>'+desc;}
function ans(el,t,id){const b=el.closest('.qb');b.querySelectorAll('.qop').forEach(o=>{if(o===el)o.classList.add(t==='c'?'correct':'wrong');else o.classList.add('dimmed');});const fb=document.getElementById(id);if(t!=='c'){fb.style.background='#fef2f2';fb.style.color='#dc2626';fb.textContent='Não exatamente — pense na questão de segurança ao abrir janelas externas.';}fb.style.display='block';}
bd();bs();document.getElementById('btn-prev').disabled=true;
