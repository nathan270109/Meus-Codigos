<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;min-height:100vh;padding:20px}
.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:12px}

let cur=0,typing=false,typeTimer=null;
function render(){const s=STEPS[cur];document.getElementById('sbadge').textContent=`Etapa ${cur+1}/${STEPS.length}`;document.getElementById('sdesc').textContent=s.label;document.getElementById('prog').style.width=`${Math.round(((cur+1)/STEPS.length)*100)}%`;document.getElementById('bp').disabled=cur===0;document.getElementById('bn').disabled=cur===STEPS.length-1;document.getElementById('narr').innerHTML=s.narr;document.getElementById('preview').innerHTML=s.prev||'';}
function playS(){if(typing)return;typing=true;const s=STEPS[cur];const out=document.getElementById('code-out');out.innerHTML='';document.getElementById('bplay').disabled=true;document.getElementById('bp').disabled=true;document.getElementById('bn').disabled=true;const full=s.code;const parts=[];let i=0;while(i<full.length){if(full[i]==='<'){const end=full.indexOf('>',i);if(end!==-1){parts.push({type:'tag',val:full.slice(i,end+1)});i=end+1;continue;}}parts.push({type:'char',val:full[i]});i++;}let pi=0;function tick(){if(pi>=parts.length){typing=false;document.getElementById('bplay').textContent='Rever';document.getElementById('bplay').disabled=false;document.getElementById('bn').disabled=cur===STEPS.length-1;document.getElementById('bp').disabled=false;return;}const p=parts[pi];if(p.type==='tag'){out.innerHTML+=p.val;pi++;tick();return;}out.innerHTML+=p.val;pi++;typeTimer=setTimeout(tick,p.val==='\n'?55:p.val===' '?18:Math.random()*22+16);}tick();}
function nextS(){if(typing){clearTimeout(typeTimer);typing=false;}cur=Math.min(cur+1,STEPS.length-1);render();document.getElementById('code-out').innerHTML=STEPS[cur].code;document.getElementById('bplay').textContent='Rever';document.getElementById('bplay').disabled=false;}
function prevS(){if(typing){clearTimeout(typeTimer);typing=false;}cur=Math.max(cur-1,0);render();document.getElementById('code-out').innerHTML=STEPS[cur].code;document.getElementById('bplay').textContent='Rever';document.getElementById('bplay').disabled=false;}
render();document.getElementById('code-out').innerHTML='';
</script>
</body>
</html>
