<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback — Imagens & Links · Aula 03</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;min-height:100vh;padding:22px}
.wrap{max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:11px}
.top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:9px}
.ttitle{font-size:17px;font-weight:600}.tmeta{font-size:12px;color:#64748b;margin-top:1px}
.chip{font-size:13px;font-weight:500;padding:5px 13px;border-radius:20px;background:#ccfbf1;border:1px solid #5eead4;color:#0D9488;font-family:'Courier New',monospace}
.chip.warn{background:#fffbeb;border-color:#fcd34d;color:#d97706}
.chip.danger{background:#fef2f2;border-color:#fca5a5;color:#dc2626}
.tbtn{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid #cbd5e1;background:#fff;color:#1e293b;cursor:pointer;font-family:inherit;transition:all .15s}
.tbtn:hover{background:#f1f5f9}.tbtn.act{background:#0D9488;color:#fff;border-color:#0D9488}.tbtn:disabled{opacity:.4;pointer-events:none}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px;text-align:center}
.sn{font-size:23px;font-weight:500;color:#1e293b}.sl{font-size:11px;color:#64748b;margin-top:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:8px}
.ac{border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;background:#fff;transition:border-color .15s}
.ac.pres{border:2px solid #0D9488}.ac.done2{border-color:#86efac}
.at{display:flex;align-items:center;gap:9px;padding:10px 12px;border-bottom:1px solid #f1f5f9}
.av{width:31px;height:31px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.an{font-size:13px;font-weight:600;color:#1e293b;line-height:1.2}.as{font-size:11px;color:#94a3b8;margin-top:1px}
.ab{padding:10px 12px}
.stars{display:flex;gap:3px;margin-bottom:7px}
.star{font-size:17px;line-height:1;cursor:pointer;color:#e2e8f0;user-select:none}
.star.on{color:#f59e0b}
.chks{display:flex;flex-direction:column;gap:3px;margin-bottom:7px}
.chk2{display:flex;align-items:center;gap:5px;font-size:11px;color:#64748b}
.mc{width:13px;height:13px;border-radius:3px;border:1px solid #cbd5e1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;background:#fff}
.mc.on{background:#22c55e;border-color:#22c55e}.mc svg{display:none}.mc.on svg{display:block}
.note{width:100%;border:1px solid #e2e8f0;border-radius:5px;padding:5px 7px;font-size:11px;font-family:inherit;color:#1e293b;background:#fff;resize:none;outline:none}
.note:focus{border-color:#0D9488}
.acts{display:flex;gap:5px;margin-top:7px}
.act{flex:1;font-size:11px;padding:5px 4px;border-radius:5px;border:1px solid #e2e8f0;background:#f8fafc;color:#64748b;cursor:pointer;font-family:inherit;text-align:center;transition:all .12s}
.act:hover{background:#ccfbf1;color:#0D9488;border-color:#5eead4}
.act.pon{background:#ccfbf1;color:#0D9488;border-color:#0D9488}
.act.don{background:#f0fdf4;color:#15803d;border-color:#86efac}
.col{border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;background:#fff}
.colh{padding:11px 15px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:13px;font-weight:600;color:#475569}
.colb{padding:13px 15px;display:flex;flex-direction:column;gap:7px}
.pto{border:1px solid #e2e8f0;border-radius:7px;padding:9px 11px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:9px}
.pto:hover{border-color:#5eead4;background:#f0fdfa}.pto.used{border-color:#5eead4;background:#ccfbf1}
.pto-ic{width:23px;height:23px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.pto-tx{font-size:12px;color:#475569;line-height:1.5;flex:1}.pto.used .pto-tx{color:#0f766e}
.pto-tg{font-size:10px;font-weight:600;padding:2px 7px;border-radius:9px;background:#fef3c7;color:#92400e;white-space:nowrap;flex-shrink:0;margin-top:1px}
.pto.used .pto-tg{background:#ccfbf1;color:#0D9488}
.add-a{display:flex;gap:7px;padding:11px 15px;border-top:1px solid #e2e8f0}
.add-a input{flex:1;border:1px solid #e2e8f0;border-radius:6px;padding:6px 9px;font-size:12px;font-family:inherit;color:#1e293b;background:#fff;outline:none}
.add-a input:focus{border-color:#0D9488}
.add-a button{font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid #5eead4;background:#ccfbf1;color:#0f766e;cursor:pointer;font-family:inherit;font-weight:500}
@media(max-width:580px){.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><div class="ttitle">Painel de apresentações — Aula 03</div><div class="tmeta">Imagens & Links · Feedback individual + coletivo · 45 minutos</div></div>
    <span class="chip" id="chip">45:00</span>
    <button class="tbtn" id="tbtn" onclick="startTimer()">Iniciar sessão</button>
    <button class="tbtn" onclick="addAluno()">+ Aluno</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="sn" id="s-total">0</div><div class="sl">Alunos</div></div>
    <div class="stat"><div class="sn" id="s-pres">0</div><div class="sl">Apresentaram</div></div>
    <div class="stat"><div class="sn" id="s-med">—</div><div class="sl">Nota média</div></div>
    <div class="stat"><div class="sn" id="s-pontos">0</div><div class="sl">Pontos discutidos</div></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="col">
    <div class="colh">Pontos de discussão coletiva — clique para marcar como discutido</div>
    <div class="colb" id="pontos"></div>
    <div class="add-a"><input type="text" id="novo" placeholder="Adicionar ponto..." onkeydown="if(event.key==='Enter')addPonto()"><button onclick="addPonto()">Adicionar</button></div>
  </div>
</div>
<script>
const CORES=[{bg:'#ccfbf1',txt:'#0f766e'},{bg:'#ede9fe',txt:'#5b21b6'},{bg:'#fef3c7',txt:'#92400e'},{bg:'#fce7f3',txt:'#9d174d'},{bg:'#dbeafe',txt:'#1e40af'},{bg:'#dcfce7',txt:'#166534'},{bg:'#fee2e2',txt:'#991b1b'},{bg:'#e0f2fe',txt:'#0369a1'}];
const CHECKS=['Alt em todas imagens','figure/figcaption ok','Imagens otimizadas','4 tipos de link','Hover+transition CSS'];
const PONTOS_BASE=[
{t:'Qual o impacto real de uma imagem sem atributo alt?',tag:'acessibilidade'},
{t:'Por que loading="lazy" melhora a performance da página?',tag:'performance'},
{t:'Diferença entre &lt;img src&gt; e background-image no CSS?',tag:'conceito'},
{t:'Quem conseguiu usar o Font Awesome? Mostre para a turma.',tag:'bônus'},
{t:'O que acontece sem rel="noopener" em links externos?',tag:'segurança'},
{t:'Prévia da Aula 04: formulários HTML e tabelas semânticas.',tag:'próxima aula'},
];
let alunos=[
  {nome:'Ana Lima',iniciais:'AL',cor:0,nota:0,checks:new Array(5).fill(false),status:'pendente',nota_txt:''},
  {nome:'Bruno Costa',iniciais:'BC',cor:1,nota:0,checks:new Array(5).fill(false),status:'pendente',nota_txt:''},
  {nome:'Carla Dias',iniciais:'CD',cor:2,nota:0,checks:new Array(5).fill(false),status:'pendente',nota_txt:''},
  {nome:'Diego Melo',iniciais:'DM',cor:3,nota:0,checks:new Array(5).fill(false),status:'pendente',nota_txt:''},
  {nome:'Ester Nunes',iniciais:'EN',cor:4,nota:0,checks:new Array(5).fill(false),status:'pendente',nota_txt:''},
  {nome:'Felipe Ramos',iniciais:'FR',cor:5,nota:0,checks:new Array(5).fill(false),status:'pendente',nota_txt:''},
];
let pontos=PONTOS_BASE.map(p=>({...p,used:false}));
let tSec=45*60,tInterval=null,ticking=false;
function initials(n){return n.trim().split(/\s+/).slice(0,2).map(x=>x[0]).join('').toUpperCase();}
function buildAlunos(){const g=document.getElementById('grid');g.innerHTML='';alunos.forEach((a,ai)=>{const av=CORES[a.cor%CORES.length];const card=document.createElement('div');card.className='ac'+(a.status==='apresentando'?' pres':'')+(a.status==='concluido'?' done2':'');card.id='ac-'+ai;const stLbl=a.status==='pendente'?'Aguardando':a.status==='apresentando'?'Apresentando agora':'Concluído';card.innerHTML=`<div class="at"><div class="av" style="background:${av.bg};color:${av.txt}">${a.iniciais}</div><div><div class="an">${a.nome}</div><div class="as">${stLbl}</div></div></div><div class="ab"><div class="stars">${[1,2,3,4,5].map(n=>`<span class="star${a.nota>=n?' on':''}" onclick="setStar(${ai},${n})">&#9733;</span>`).join('')}</div><div class="chks">${CHECKS.map((c,ci)=>`<div class="chk2"><div class="mc${a.checks[ci]?' on':''}" id="mc-${ai}-${ci}" onclick="togChk(${ai},${ci})"><svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1 4.5l2.5 2.5 4-4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span>${c}</span></div>`).join('')}</div><textarea class="note" rows="2" placeholder="Observações..." oninput="saveNote(${ai},this.value)">${a.nota_txt}</textarea><div class="acts"><div class="act${a.status==='apresentando'?' pon':''}" onclick="setStatus(${ai},'apresentando')">Apresentando</div><div class="act${a.status==='concluido'?' don':''}" onclick="setStatus(${ai},'concluido')">Concluído</div></div></div>`;g.appendChild(card);});updateStats();}
function setStar(ai,n){alunos[ai].nota=alunos[ai].nota===n?0:n;buildAlunos();}
function togChk(ai,ci){alunos[ai].checks[ci]=!alunos[ai].checks[ci];buildAlunos();}
function setStatus(ai,s){alunos[ai].status=alunos[ai].status===s?'pendente':s;buildAlunos();}
function saveNote(ai,v){alunos[ai].nota_txt=v;}
function addAluno(){const n=prompt('Nome do aluno:');if(!n||!n.trim())return;alunos.push({nome:n.trim(),iniciais:initials(n),cor:alunos.length%CORES.length,nota:0,checks:new Array(5).fill(false),status:'pendente',nota_txt:''});buildAlunos();}
function updateStats(){document.getElementById('s-total').textContent=alunos.length;document.getElementById('s-pres').textContent=alunos.filter(a=>a.status==='concluido').length;const rated=alunos.filter(a=>a.nota>0);document.getElementById('s-med').textContent=rated.length?(rated.reduce((s,a)=>s+a.nota,0)/rated.length).toFixed(1)+'★':'—';document.getElementById('s-pontos').textContent=pontos.filter(p=>p.used).length;}
function buildPontos(){const el=document.getElementById('pontos');el.innerHTML='';pontos.forEach((p,i)=>{const d=document.createElement('div');d.className='pto'+(p.used?' used':'');d.onclick=()=>{p.used=!p.used;buildPontos();updateStats();};d.innerHTML=`<div class="pto-ic" style="background:${p.used?'#ccfbf1':'#f1f5f9'};color:${p.used?'#0D9488':'#64748b'}">${p.used?'✓':'?'}</div><div class="pto-tx">${p.t}</div><div class="pto-tg">${p.tag}</div>`;el.appendChild(d);});}
function addPonto(){const inp=document.getElementById('novo');const v=inp.value.trim();if(!v)return;pontos.push({t:v,tag:'custom',used:false});inp.value='';buildPontos();}
function startTimer(){const btn=document.getElementById('tbtn');if(!ticking){ticking=true;btn.textContent='Pausar';btn.className='tbtn act';tInterval=setInterval(()=>{tSec--;const m=Math.floor(tSec/60),s=tSec%60;const chip=document.getElementById('chip');chip.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(tSec<=300)chip.className='chip warn';if(tSec<=60)chip.className='chip danger';if(tSec<=0){clearInterval(tInterval);ticking=false;btn.textContent='Encerrado';btn.disabled=true;}},1000);}else{ticking=false;clearInterval(tInterval);btn.textContent='Continuar';btn.className='tbtn';}}
buildAlunos();buildPontos();
</script>
</body>
</html>
