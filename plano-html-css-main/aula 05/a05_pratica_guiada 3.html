<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prática Guiada — CSS Flexbox · Aula 05</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;min-height:100vh;padding:22px}
.wrap{max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:11px}
.pg-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px}
.pg-title{font-size:17px;font-weight:600}.pg-meta{font-size:12px;color:#64748b;margin-top:2px}
.pg-time{font-size:12px;font-weight:500;background:#f1f5f9;border:1px solid #e2e8f0;padding:4px 12px;border-radius:8px;color:#64748b}
.prog-row{display:flex;align-items:center;gap:9px}
.pb{flex:1;height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.pf{height:100%;background:#EA580C;border-radius:4px;transition:width .4s ease;width:0%}
.pt{font-size:12px;font-weight:600;color:#64748b;min-width:60px;text-align:right}
.steps{display:flex;flex-direction:column;gap:8px}
.sc{border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;background:#fff;transition:border-color .2s}
.sc.done-c{border-color:#86efac}.sc.open-c{border-color:#fb923c}
.sh{display:flex;align-items:flex-start;gap:11px;padding:12px 13px;cursor:pointer;user-select:none;transition:background .15s}
.sh:hover{background:#f8fafc}.sc.open-c .sh{background:#fff7ed}
.chk{width:21px;height:21px;border-radius:6px;border:1.5px solid #cbd5e1;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .18s;cursor:pointer;background:#fff}
.chk:hover{border-color:#EA580C;background:#ffedd5}.chk.done{background:#22c55e;border-color:#22c55e}
.chk svg{display:none}.chk.done svg{display:block}
.si{flex:1}.sn2{font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.st{font-size:13px;font-weight:600;color:#1e293b;line-height:1.3}.stm{font-size:11px;color:#94a3b8;margin-top:2px}
.cv{color:#94a3b8;font-size:11px;margin-top:4px;transition:transform .22s;flex-shrink:0}
.sc.open-c .cv{transform:rotate(180deg)}
.sb{max-height:0;overflow:hidden;transition:max-height .35s ease}
.sc.open-c .sb{max-height:1400px}
.sbi{padding:0 13px 14px;border-top:1px solid #f1f5f9}
.il{display:flex;flex-direction:column;gap:6px;margin:11px 0}
.ii{display:flex;gap:9px;font-size:13px;color:#475569;line-height:1.55;align-items:flex-start}
.in{width:19px;height:19px;min-width:19px;border-radius:5px;background:#ffedd5;color:#EA580C;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
code{font-family:'Courier New',monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
.cb2{background:#1e293b;border-radius:8px;padding:12px 15px;font-family:'Courier New',monospace;font-size:12px;line-height:1.8;color:#94a3b8;margin:9px 0;overflow-x:auto;white-space:pre}
.k{color:#93c5fd}.p{color:#c4b5fd}.v{color:#6ee7b7}.s{color:#fda4af}.c{color:#475569;font-style:italic}
.tip{background:#fff7ed;border-left:3px solid #EA580C;padding:8px 12px;font-size:12px;color:#7c2d12;line-height:1.5;margin-top:8px}
.tip strong{color:#9a3412;font-weight:600}
.mb{display:inline-flex;align-items:center;gap:5px;background:#f8fafc;border:1px solid #cbd5e1;color:#64748b;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s;margin-top:10px}
.mb:hover{background:#f0fdf4;color:#15803d;border-color:#86efac}
.mb.done-btn{background:#f0fdf4;color:#15803d;border-color:#86efac;pointer-events:none}
.success-b{background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:18px;text-align:center;display:none}
.success-b.show{display:block}
.success-b h3{font-size:15px;font-weight:600;color:#15803d;margin-bottom:5px}
.success-b p{font-size:13px;color:#475569}
a{color:#EA580C}
</style>
</head>
<body>
<div class="wrap">
  <div class="pg-header">
    <div><div class="pg-title">Prática guiada — CSS Flexbox</div><div class="pg-meta">Siga os passos. Marque cada um quando terminar.</div></div>
    <span class="pg-time">60 min disponíveis</span>
  </div>
  <div class="prog-row"><div class="pb"><div class="pf" id="pf"></div></div><div class="pt" id="pt">0 / 8</div></div>
  <div class="steps" id="steps"></div>
  <div class="success-b" id="success-el"><h3>Flexbox dominado!</h3><p>Todas as páginas com layout moderno. Hora do desafio autônomo!</p></div>
</div>
<script>
const STEPS=[
{title:"Jogar Flexbox Froggy para fixar os conceitos",time:"10 min",
instrs:["Acesse <a href='https://flexboxfroggy.com/#pt-br' target='_blank'>flexboxfroggy.com/#pt-br</a> — jogo em português!","Complete até o nível 10 (os mais importantes para o projeto)","Anote as propriedades que causaram mais dificuldade","Compartilhe com o docente qual nível foi o mais difícil"],
code:"",tip:"<strong>Flexbox Froggy:</strong> 24 níveis que cobrem todas as propriedades. Os níveis 1-10 cobrem o essencial para o projeto. Volte aos outros quando tiver tempo livre."},
{title:"Adicionar variáveis CSS no :root",time:"7 min",
instrs:["No topo do <code>css/estilos.css</code>, adicione a seção <code>:root { }</code> com todas as variáveis do projeto","Crie: <code>--cor-primaria</code>, <code>--cor-secundaria</code>, <code>--cor-destaque</code>, <code>--fonte-principal</code>, <code>--raio</code>","Substitua os valores fixos de cor e fonte no CSS existente por <code>var(--nome-da-variavel)</code>","Teste: mude a cor primária só na variável e veja a página toda atualizar"],
code:`<span class="k">:root</span> {
  <span class="p">--cor-primaria</span>:   <span class="v">#2563eb</span>;
  <span class="p">--cor-secundaria</span>: <span class="v">#1d4ed8</span>;
  <span class="p">--cor-destaque</span>:   <span class="v">#ea580c</span>;
  <span class="p">--fonte</span>: <span class="v">'Segoe UI', Arial, sans-serif</span>;
  <span class="p">--raio</span>:          <span class="v">10px</span>;
  <span class="p">--sombra</span>: <span class="v">0 4px 12px rgba(0,0,0,.08)</span>;
}

<span class="c">/* Usando as variáveis */</span>
<span class="k">header</span> {
  <span class="p">background</span>: <span class="v">var(--cor-primaria)</span>;
  <span class="p">font-family</span>: <span class="v">var(--fonte)</span>;
}`,tip:"<strong>Por que variáveis CSS?</strong> Imagine mudar a cor primária do projeto — sem variáveis você teria que encontrar e substituir dezenas de ocorrências. Com variáveis, muda em um lugar e reflete em todo o projeto."},
{title:"Flexbox no header — logo e nav",time:"8 min",
instrs:["No CSS do <code>header</code>, adicione <code>display: flex; align-items: center; justify-content: space-between;</code>","Salve e veja: o logo vai para a esquerda e a nav vai para a direita automaticamente!","Adicione <code>padding: 0 40px; height: 64px;</code> para dar altura e espaçamento","No <code>nav</code>, adicione <code>display: flex; gap: 8px;</code> para alinhar os links horizontalmente"],
code:`<span class="k">header</span> {
  <span class="p">background</span>: <span class="v">var(--cor-primaria)</span>;
  <span class="p">color</span>: <span class="v">white</span>;
  <span class="p">display</span>: <span class="v">flex</span>;
  <span class="p">align-items</span>: <span class="v">center</span>;
  <span class="p">justify-content</span>: <span class="v">space-between</span>;
  <span class="p">padding</span>: <span class="v">0 40px</span>;
  <span class="p">height</span>: <span class="v">64px</span>;
}

<span class="k">nav</span> {
  <span class="p">display</span>: <span class="v">flex</span>;
  <span class="p">gap</span>: <span class="v">8px</span>;
}`,tip:"<strong>justify-content: space-between</strong> empurra o primeiro item para a esquerda e o último para a direita — perfeito para header com logo + nav."},
{title:"Flexbox na seção hero",time:"8 min",
instrs:["Na section.hero, adicione <code>display: flex; align-items: center; gap: 40px; padding: 60px 40px;</code>","Dentro do hero, coloque o texto em um div e um elemento decorativo (emoji grande, etc.) no outro","O texto deve ter <code>flex: 2</code> e o elemento decorativo <code>flex: 1</code> (proporção 2/3 e 1/3)","Salve: o texto fica à esquerda e o elemento à direita, alinhados verticalmente"],
code:`<span class="k">.hero</span> {
  <span class="p">display</span>: <span class="v">flex</span>;
  <span class="p">align-items</span>: <span class="v">center</span>;
  <span class="p">gap</span>: <span class="v">40px</span>;
  <span class="p">padding</span>: <span class="v">60px 40px</span>;
  <span class="p">background</span>: <span class="v">linear-gradient(135deg, var(--cor-primaria), var(--cor-secundaria))</span>;
  <span class="p">color</span>: <span class="v">white</span>;
}

<span class="k">.hero-texto</span> { <span class="p">flex</span>: <span class="v">2</span>; }
<span class="k">.hero-icone</span> {
  <span class="p">flex</span>: <span class="v">1</span>;
  <span class="p">text-align</span>: <span class="v">center</span>;
  <span class="p">font-size</span>: <span class="v">6rem</span>;
  <span class="p">opacity</span>: <span class="v">0.3</span>;
}`,tip:"<strong>flex: 2</strong> e <strong>flex: 1</strong> distribuem o espaço em proporção — o primeiro fica com 2/3, o segundo com 1/3. É muito mais inteligente que usar porcentagens fixas."},
{title:"Grade de cards com flex-wrap",time:"8 min",
instrs:["Crie um container <code>.cards-grid</code> com <code>display: flex; flex-wrap: wrap; gap: 20px;</code>","Cada card dentro deve ter <code>flex: 1 1 220px;</code> — significa: cresce, encolhe, mínimo de 220px","Salve: em telas largas aparecem vários cards por linha. Em telas estreitas os cards quebram para linha nova","Redimensione a janela do browser para ver a responsividade em ação"],
code:`<span class="k">.cards-grid</span> {
  <span class="p">display</span>: <span class="v">flex</span>;
  <span class="p">flex-wrap</span>: <span class="v">wrap</span>;
  <span class="p">gap</span>: <span class="v">20px</span>;
}

<span class="k">.card</span> {
  <span class="p">flex</span>: <span class="v">1 1 220px</span>; <span class="c">/* cresce | encolhe | base 220px */</span>
  <span class="p">max-width</span>: <span class="v">300px</span>;
  <span class="p">background</span>: <span class="v">white</span>;
  <span class="p">border-radius</span>: <span class="v">var(--raio)</span>;
  <span class="p">padding</span>: <span class="v">20px</span>;
  <span class="p">box-shadow</span>: <span class="v">var(--sombra)</span>;
}`,tip:"<strong>flex: 1 1 220px</strong> é um atalho para flex-grow:1, flex-shrink:1, flex-basis:220px. O min-width de 220px evita que os cards fiquem muito estreitos — abaixo disso quebram para a próxima linha."},
{title:"Layout 2 colunas na sobre.html",time:"8 min",
instrs:["Na sobre.html, crie um container <code>.layout-2col</code> envolvendo o conteúdo principal e uma imagem/aside","Adicione no CSS: <code>display: flex; gap: 40px; align-items: flex-start;</code>","O conteúdo recebe <code>flex: 2</code> e a imagem/aside recebe <code>flex: 1</code>","Salve: texto e imagem ficam lado a lado!"],
code:`<span class="k">.layout-2col</span> {
  <span class="p">display</span>: <span class="v">flex</span>;
  <span class="p">gap</span>: <span class="v">40px</span>;
  <span class="p">align-items</span>: <span class="v">flex-start</span>;
}

<span class="k">.layout-2col .conteudo</span> { <span class="p">flex</span>: <span class="v">2</span>; }
<span class="k">.layout-2col .lateral</span>  { <span class="p">flex</span>: <span class="v">1</span>; }`,tip:"<strong>align-items: flex-start</strong> evita que a coluna menor se estique para combinar com a maior. Se você quiser colunas de mesma altura (mesmo que o conteúdo seja diferente), use <code>align-items: stretch</code>."},
{title:"Flexbox no footer — 3 colunas",time:"6 min",
instrs:["No footer, crie 3 divs filhos: logo+texto, links de navegação, informações de contato","No CSS do footer: <code>display: flex; justify-content: space-between; gap: 40px; flex-wrap: wrap;</code>","Cada coluna recebe <code>flex: 1; min-width: 200px;</code>","Salve: o footer fica com 3 colunas distribuídas!"],
code:`<span class="k">.footer-grid</span> {
  <span class="p">display</span>: <span class="v">flex</span>;
  <span class="p">justify-content</span>: <span class="v">space-between</span>;
  <span class="p">gap</span>: <span class="v">40px</span>;
  <span class="p">flex-wrap</span>: <span class="v">wrap</span>;
  <span class="p">max-width</span>: <span class="v">1100px</span>;
  <span class="p">margin</span>: <span class="v">0 auto</span>;
  <span class="p">padding</span>: <span class="v">40px 20px</span>;
}

<span class="k">.footer-col</span> {
  <span class="p">flex</span>: <span class="v">1</span>;
  <span class="p">min-width</span>: <span class="v">200px</span>;
}`,tip:"<strong>flex-wrap: wrap</strong> no footer faz as colunas quebrarem para linhas menores em dispositivos móveis — responsividade gratuita sem media queries adicionais."},
{title:"Verificar e eliminar todos os floats",time:"5 min",
instrs:["No VS Code, use Ctrl+Shift+F para buscar 'float' em todos os arquivos CSS","Substitua qualquer float restante por Flexbox equivalente","Valide o HTML de todas as páginas em <a href='https://validator.w3.org/#validate_by_input' target='_blank'>validator.w3.org</a>","Redimensione a janela e confirme que o layout se adapta em diferentes larguras"],
code:"",tip:"<strong>Regra do projeto:</strong> zero floats. Se encontrar algum, substitua por display: flex. Floats são obsoletos para layout e causam bugs difíceis de depurar — só existem para textos envolvendo imagens."}
];
let done=new Set();
function build(){const list=document.getElementById('steps');STEPS.forEach((s,i)=>{const card=document.createElement('div');card.className='sc'+(i===0?' open-c':'');card.id='sc-'+i;card.innerHTML=`<div class="sh" onclick="tog(${i})"><div class="chk" id="chk-${i}" onclick="event.stopPropagation();mk(${i})"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="si"><div class="sn2">Passo ${i+1} de ${STEPS.length}</div><div class="st">${s.title}</div><div class="stm">${s.time}</div></div><span class="cv">${i===0?'▲':'▼'}</span></div><div class="sb"><div class="sbi"><div class="il">${s.instrs.map((t,j)=>`<div class="ii"><div class="in">${j+1}</div><span>${t}</span></div>`).join('')}</div>${s.code?`<div class="cb2">${s.code}</div>`:''}<div class="tip">${s.tip}</div><button class="mb" id="mb-${i}" onclick="mk(${i})"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Marcar como concluído</button></div></div>`;list.appendChild(card);});}
function tog(i){const c=document.getElementById('sc-'+i);const o=c.classList.contains('open-c');document.querySelectorAll('.sc').forEach(x=>{x.classList.remove('open-c');x.querySelector('.cv').textContent='▼';});if(!o){c.classList.add('open-c');c.querySelector('.cv').textContent='▲';}}
function mk(i){if(done.has(i))return;done.add(i);document.getElementById('chk-'+i).classList.add('done');document.getElementById('sc-'+i).classList.add('done-c');const mb=document.getElementById('mb-'+i);mb.classList.add('done-btn');mb.innerHTML='<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3.5 3.5 5.5-5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Concluído!';upd();if(i<STEPS.length-1){document.querySelectorAll('.sc').forEach(x=>{x.classList.remove('open-c');x.querySelector('.cv').textContent='▼';});const nx=document.getElementById('sc-'+(i+1));nx.classList.add('open-c');nx.querySelector('.cv').textContent='▲';setTimeout(()=>nx.scrollIntoView({behavior:'smooth',block:'nearest'}),100);}if(done.size===STEPS.length)document.getElementById('success-el').classList.add('show');}
function upd(){document.getElementById('pf').style.width=Math.round((done.size/STEPS.length)*100)+'%';document.getElementById('pt').textContent=done.size+' / '+STEPS.length;}
build();upd();
</script>
</body>
</html>
