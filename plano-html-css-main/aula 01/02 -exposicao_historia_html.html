<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exposição Dialogada — História do HTML · Aula 01</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;color:#1e293b;background:#f8fafc;overflow:hidden}

#app{display:flex;flex-direction:column;height:100vh}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;flex-wrap:wrap;gap:8px}
.hdr-left{display:flex;align-items:center;gap:12px}
.badge{background:#1d4ed8;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.hdr-title{font-size:14px;font-weight:600;color:#1e293b}
.hdr-sub{font-size:12px;color:#94a3b8;margin-top:1px}
.timer{font-size:13px;font-weight:500;color:#64748b;background:#f1f5f9;padding:5px 14px;border-radius:8px;border:1px solid #e2e8f0;min-width:64px;text-align:center;font-family:'Courier New',monospace}
.timer.warn{color:#d97706;background:#fffbeb;border-color:#fcd34d}
.timer.danger{color:#dc2626;background:#fef2f2;border-color:#fca5a5}

/* PROGRESS DOTS */
.dots{display:flex;align-items:center;gap:6px;padding:10px 20px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;overflow-x:auto;white-space:nowrap}
.dot{width:8px;height:8px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.active{background:#1d4ed8;transform:scale(1.45)}
.dot.done{background:#93c5fd;opacity:.6}
.dot-sep{width:12px;height:1px;background:#e2e8f0;flex-shrink:0}

/* SLIDE AREA */
.slide-wrap{flex:1;overflow:hidden;position:relative}
.slide{position:absolute;inset:0;padding:24px 28px;overflow-y:auto;display:none}
.slide.active{display:block;animation:sIn .25s ease}
@keyframes sIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* TYPOGRAPHY */
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#94a3b8;margin-bottom:6px}
.slide-title{font-size:22px;font-weight:600;color:#1e293b;line-height:1.2;margin-bottom:6px}
.slide-sub{font-size:14px;color:#64748b;line-height:1.6;margin-bottom:18px}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:16px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px}
.card.accent{border-left:3px solid #1d4ed8}
.card-icon{font-size:20px;margin-bottom:6px}
.card-title{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:4px}
.card-body{font-size:12px;color:#64748b;line-height:1.55}
.card-body em{font-style:italic}
.card-body code{font-family:'Courier New',monospace;font-size:11px;background:#f1f5f9;padding:1px 4px;border-radius:3px;border:1px solid #e2e8f0}

/* TIMELINE */
.timeline{position:relative;padding-left:26px}
.timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:1.5px;background:#e2e8f0}
.tl-item{position:relative;margin-bottom:14px;cursor:pointer}
.tl-item::before{content:'';position:absolute;left:-22px;top:6px;width:10px;height:10px;border-radius:50%;border:2px solid #e2e8f0;background:#fff;transition:all .2s}
.tl-item:hover::before{background:#3b82f6;border-color:#3b82f6}
.tl-item.tl-open::before{background:#1d4ed8;border-color:#1d4ed8;transform:scale(1.25)}
.tl-year{font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:2px}
.tl-head{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:3px}
.tl-desc{font-size:12px;color:#64748b;line-height:1.55;max-height:0;overflow:hidden;transition:max-height .3s ease}
.tl-item.tl-open .tl-desc{max-height:160px}
.tl-tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;margin-top:5px}

/* CODE */
.code-wrap{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:10px 0}
.code-hdr{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:7px 14px;border-bottom:1px solid #e2e8f0}
.code-lang{font-size:11px;font-weight:500;color:#64748b}
.cdots{display:flex;gap:5px}
.cdot{width:10px;height:10px;border-radius:50%}
pre{background:#1e293b;color:#e2e8f0;padding:14px 16px;font-size:12px;line-height:1.75;overflow-x:auto;font-family:'Courier New',monospace;white-space:pre}
.k{color:#93c5fd}.kv{color:#6ee7b7}.a{color:#fde68a}.s{color:#fda4af}.t{color:#e2e8f0}.c{color:#475569;font-style:italic}

/* COMPARE */
.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:560px){.compare{grid-template-columns:1fr}}
.comp-side{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.comp-hdr{padding:8px 14px;font-size:12px;font-weight:600}
.comp-body{padding:10px 14px;font-size:12px;color:#64748b;line-height:1.65}
.comp-body code{font-family:'Courier New',monospace;font-size:11px;background:#f1f5f9;padding:1px 4px;border-radius:3px;border:1px solid #e2e8f0}

/* TAG EXPLORER */
.tag-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
@media(max-width:500px){.tag-grid{grid-template-columns:1fr 1fr}}
.tag-item{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .15s}
.tag-item:hover{border-color:#93c5fd;background:#eff6ff}
.tag-item.tag-on{border-color:#1d4ed8;background:#eff6ff}
.tag-code{font-size:12px;font-weight:600;color:#1d4ed8;font-family:'Courier New',monospace;margin-bottom:3px}
.tag-name{font-size:11px;color:#94a3b8}
.tag-preview{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px 14px;min-height:56px;font-size:13px;color:#64748b;line-height:1.6}
.tag-preview strong{color:#1e293b;font-weight:600;font-family:'Courier New',monospace}

/* QUIZ */
.quiz-q{font-size:14px;font-weight:600;color:#1e293b;margin-bottom:12px;line-height:1.5}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.quiz-opt{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;font-size:13px;color:#1e293b;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px}
.quiz-opt:hover:not(.correct):not(.wrong):not(.dimmed){border-color:#93c5fd;background:#eff6ff}
.quiz-opt.correct{background:#f0fdf4;border-color:#86efac;color:#15803d;pointer-events:none}
.quiz-opt.wrong{background:#fef2f2;border-color:#fca5a5;color:#dc2626;pointer-events:none}
.quiz-opt.dimmed{opacity:.4;pointer-events:none}
.quiz-feedback{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.5;display:none}
.quiz-block{margin-bottom:18px}

/* REFLECT */
.reflect-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.reflect-item{display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px}
.reflect-num{width:24px;height:24px;min-width:24px;border-radius:6px;background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px}
.reflect-text{font-size:13px;color:#64748b;line-height:1.55}
.reflect-text strong{color:#1e293b;font-weight:600}

/* HIGHLIGHT BOX */
.hl{background:#fffbeb;border-left:3px solid #f59e0b;padding:10px 14px;font-size:13px;color:#78350f;line-height:1.55;margin:10px 0}
.hl strong{color:#92400e;font-weight:600}

/* NAV BAR */
.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
.nav-btn{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;padding:7px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:6px}
.nav-btn:hover{background:#e2e8f0;color:#1e293b}
.nav-btn.primary{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.nav-btn.primary:hover{background:#1e40af}
.nav-btn:disabled{opacity:.35;pointer-events:none}
.nav-counter{font-size:12px;color:#94a3b8}

code{font-family:'Courier New',monospace;font-size:12px;background:#f1f5f9;padding:1px 5px;border-radius:3px;border:1px solid #e2e8f0}
</style>
</head>
<body>

<div id="app">
  <div class="hdr">
    <div class="hdr-left">
      <span class="badge">Aula 01</span>
      <div>
        <div class="hdr-title">História do HTML — Exposição Dialogada</div>
        <div class="hdr-sub">30 minutos · Projetor · Turma</div>
      </div>
    </div>
    <div class="timer" id="timer">30:00</div>
  </div>

  <div class="dots" id="dots-bar"></div>

  <div class="slide-wrap" id="slide-wrap"></div>

  <div class="nav">
    <button class="nav-btn" id="btn-prev" onclick="nav(-1)" disabled>← Anterior</button>
    <span class="nav-counter" id="counter">1 / 9</span>
    <button class="nav-btn primary" id="btn-next" onclick="nav(1)">Próximo →</button>
  </div>
</div>

<script>
const SLIDES = [
  {
    id:'intro', time:3,
    render:()=>`
      <div class="eyebrow">Abertura · 3 minutos</div>
      <div class="slide-title">A web existe porque existe o HTML</div>
      <div class="slide-sub">Antes de escrever a primeira linha de código, entenda onde tudo começou — e por que essa história importa para vocês hoje.</div>
      <div class="cards">
        <div class="card accent">
          <div class="card-icon">🌐</div>
          <div class="card-title">1989 — A ideia</div>
          <div class="card-body">Tim Berners-Lee, físico no CERN (Suíça), propõe um sistema de documentos interligados para que cientistas compartilhem informações.</div>
        </div>
        <div class="card accent">
          <div class="card-icon">📄</div>
          <div class="card-title">O problema que ele queria resolver</div>
          <div class="card-body">Pesquisadores saíam do laboratório e o conhecimento ficava preso com eles. Ele queria documentar e conectar tudo.</div>
        </div>
        <div class="card">
          <div class="card-icon">💬</div>
          <div class="card-title">Pergunta para a turma</div>
          <div class="card-body"><em>"Qual foi a última coisa que vocês fizeram na web hoje? YouTube, Instagram, Google..."</em><br>Tudo isso roda sobre HTML.</div>
        </div>
        <div class="card">
          <div class="card-icon">🎯</div>
          <div class="card-title">O que veremos hoje</div>
          <div class="card-body">A evolução do HTML do zero ao HTML5, as diferenças entre versões e por que a semântica mudou tudo.</div>
        </div>
      </div>`
  },
  {
    id:'timeline', time:8,
    render:()=>`
      <div class="eyebrow">Contexto histórico · 8 minutos</div>
      <div class="slide-title">De 1991 até hoje</div>
      <div class="slide-sub">Clique em cada versão para expandir os detalhes.</div>
      <div class="timeline" id="tl">
        <div class="tl-item" onclick="tlClick(0)">
          <div class="tl-year">1991</div>
          <div class="tl-head">HTML 1.0 — O início</div>
          <div class="tl-desc">Tim Berners-Lee publica a primeira especificação. Apenas 18 tags. Sem imagens, sem tabelas, sem CSS. Era só texto com links.<br><span class="tl-tag" style="background:#eff6ff;color:#1d4ed8">18 tags</span></div>
        </div>
        <div class="tl-item" onclick="tlClick(1)">
          <div class="tl-year">1995</div>
          <div class="tl-head">HTML 2.0 — Formulários chegam</div>
          <div class="tl-desc">Primeira versão oficial publicada como padrão. Formulários e inputs chegam — a web começa a ser interativa.<br><span class="tl-tag" style="background:#f0fdf4;color:#15803d">padrão oficial</span></div>
        </div>
        <div class="tl-item" onclick="tlClick(2)">
          <div class="tl-year">1997</div>
          <div class="tl-head">HTML 3.2 — Tabelas e scripts</div>
          <div class="tl-desc">Suporte a tabelas usadas como layout. Cada empresa inventava suas próprias tags. &lt;blink&gt; e &lt;marquee&gt; existiam.<br><span class="tl-tag" style="background:#fffbeb;color:#92400e">era das tabelas</span></div>
        </div>
        <div class="tl-item" onclick="tlClick(3)">
          <div class="tl-year">1999</div>
          <div class="tl-head">HTML 4.01 — Separação de responsabilidades</div>
          <div class="tl-desc">Grande avanço: HTML cuida da estrutura, CSS cuida da aparência. Tags de apresentação passam a ser depreciadas.<br><span class="tl-tag" style="background:#ede9fe;color:#5b21b6">HTML + CSS</span></div>
        </div>
        <div class="tl-item" onclick="tlClick(4)">
          <div class="tl-year">2000–2004</div>
          <div class="tl-head">XHTML — A tentativa rígida</div>
          <div class="tl-desc">HTML reescrito como XML. Regras severas: um erro de sintaxe travava a página inteira. Não deu certo.<br><span class="tl-tag" style="background:#fef2f2;color:#991b1b">fracasso histórico</span></div>
        </div>
        <div class="tl-item" onclick="tlClick(5)">
          <div class="tl-year">2014</div>
          <div class="tl-head">HTML5 — A revolução semântica</div>
          <div class="tl-desc">Padrão atual. Tags semânticas (&lt;header&gt;, &lt;nav&gt;, &lt;main&gt;, &lt;footer&gt;), APIs nativas, formulários poderosos.<br><span class="tl-tag" style="background:#ccfbf1;color:#0f766e">padrão atual</span></div>
        </div>
        <div class="tl-item" onclick="tlClick(6)">
          <div class="tl-year">2019–hoje</div>
          <div class="tl-head">HTML Living Standard — Evolução contínua</div>
          <div class="tl-desc">O WHATWG (Apple, Mozilla, Google, Microsoft) mantém o HTML como padrão vivo — sem versões fixas, atualizações contínuas.<br><span class="tl-tag" style="background:#eff6ff;color:#1d4ed8">em evolução constante</span></div>
        </div>
      </div>`
  },
  {
    id:'problema', time:3,
    render:()=>`
      <div class="eyebrow">Conceito central · 3 minutos</div>
      <div class="slide-title">Por que o HTML precisava evoluir?</div>
      <div class="slide-sub">O caos das tabelas para layout e o que a semântica resolveu.</div>
      <div class="compare">
        <div class="comp-side">
          <div class="comp-hdr" style="background:#fef2f2;color:#dc2626">HTML 3.2 — Código de 1997</div>
          <div class="comp-body">Sites usavam <strong>tabelas</strong> para criar colunas:<br><br>
            <code>&lt;table&gt;&lt;tr&gt;&lt;td&gt;menu&lt;/td&gt;&lt;td&gt;conteúdo&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;</code><br><br>
            Problemas:<br>
            • Código ilegível<br>
            • Lento para carregar<br>
            • Impossível para leitores de tela<br>
            • Pesadelo para manutenção</div>
        </div>
        <div class="comp-side">
          <div class="comp-hdr" style="background:#f0fdf4;color:#15803d">HTML5 — Código atual</div>
          <div class="comp-body">Tags que <strong>descrevem o conteúdo</strong>:<br><br>
            <code>&lt;header&gt;, &lt;nav&gt;, &lt;main&gt;, &lt;footer&gt;</code><br><br>
            Vantagens:<br>
            • Código legível por humanos<br>
            • Entendido por buscadores (SEO)<br>
            • Acessível para leitores de tela<br>
            • Fácil de manter e atualizar</div>
        </div>
      </div>
      <div class="hl"><strong>Analogia:</strong> Imagine um livro onde cada capítulo é identificado apenas por "Box 1", "Box 2"... vs. um livro com "Introdução", "Desenvolvimento", "Conclusão". Qual é mais fácil de navegar?</div>`
  },
  {
    id:'estrutura', time:4,
    render:()=>`
      <div class="eyebrow">Código na prática · 4 minutos</div>
      <div class="slide-title">O esqueleto de toda página HTML5</div>
      <div class="slide-sub">Cada linha desta estrutura existe por um motivo. Vamos entender cada uma.</div>
      <div class="code-wrap">
        <div class="code-hdr">
          <span class="code-lang">HTML5 · Estrutura mínima obrigatória</span>
          <div class="cdots"><div class="cdot" style="background:#ef4444"></div><div class="cdot" style="background:#f59e0b"></div><div class="cdot" style="background:#10b981"></div></div>
        </div>
        <pre><span class="c">&lt;!-- 1. Diz ao browser: "isto é HTML5" --&gt;</span>
<span class="k">&lt;!DOCTYPE html&gt;</span>

<span class="c">&lt;!-- 2. Raiz do documento | lang = acessibilidade + SEO --&gt;</span>
<span class="k">&lt;html</span> <span class="a">lang</span>=<span class="s">"pt-BR"</span><span class="k">&gt;</span>

<span class="c">&lt;!-- 3. Informações invisíveis para o browser --&gt;</span>
<span class="k">&lt;head&gt;</span>
  <span class="k">&lt;meta</span> <span class="a">charset</span>=<span class="s">"UTF-8"</span><span class="k">&gt;</span>     <span class="c">&lt;!-- permite acentos e ç --&gt;</span>
  <span class="k">&lt;meta</span> <span class="a">name</span>=<span class="s">"viewport"</span> <span class="a">content</span>=<span class="s">"width=device-width, initial-scale=1.0"</span><span class="k">&gt;</span>
  <span class="k">&lt;title&gt;</span><span class="t">Minha Página</span><span class="k">&lt;/title&gt;</span>
<span class="k">&lt;/head&gt;</span>

<span class="c">&lt;!-- 4. Tudo que o usuário VÊ fica aqui --&gt;</span>
<span class="k">&lt;body&gt;</span>
  <span class="k">&lt;h1&gt;</span><span class="t">Olá, mundo!</span><span class="k">&lt;/h1&gt;</span>
  <span class="k">&lt;p&gt;</span><span class="t">Minha primeira página.</span><span class="k">&lt;/p&gt;</span>
<span class="k">&lt;/body&gt;</span>

<span class="k">&lt;/html&gt;</span></pre>
      </div>
      <div class="cards" style="grid-template-columns:repeat(3,1fr);margin-top:12px">
        <div class="card"><div class="card-title">!DOCTYPE</div><div class="card-body">Não é uma tag. É uma declaração. Sem ela o browser entra em "modo quirks" — comportamento imprevisível.</div></div>
        <div class="card"><div class="card-title">charset UTF-8</div><div class="card-body">Sem isso: "caf&#xFFFD;" em vez de "café". Sempre a primeira meta tag.</div></div>
        <div class="card"><div class="card-title">viewport</div><div class="card-body">Faz a página funcionar no celular. Sem isso o site aparece minúsculo em smartphones.</div></div>
      </div>`
  },
  {
    id:'semantica', time:5,
    render:()=>`
      <div class="eyebrow">Prática interativa · 5 minutos</div>
      <div class="slide-title">Tags semânticas — clique para explorar</div>
      <div class="slide-sub">Cada tag semântica comunica o <em>papel</em> do conteúdo. Clique em cada uma para ver o que ela representa.</div>
      <div class="tag-grid">
        <div class="tag-item" onclick="showTag(this,'&lt;header&gt;','Cabeçalho da página ou de uma seção. Geralmente contém logo, título principal e navegação. Pode aparecer uma vez por seção — não só no topo da página.')">
          <div class="tag-code">&lt;header&gt;</div><div class="tag-name">Cabeçalho</div>
        </div>
        <div class="tag-item" onclick="showTag(this,'&lt;nav&gt;','Bloco de navegação principal do site. Acessibilidade: leitores de tela anunciam este bloco como região de navegação. Não use em todos os grupos de links — só nos principais.')">
          <div class="tag-code">&lt;nav&gt;</div><div class="tag-name">Navegação</div>
        </div>
        <div class="tag-item" onclick="showTag(this,'&lt;main&gt;','Conteúdo principal e único da página. Deve existir apenas UMA vez por documento. Leitores de tela permitem pular diretamente para este bloco.')">
          <div class="tag-code">&lt;main&gt;</div><div class="tag-name">Conteúdo principal</div>
        </div>
        <div class="tag-item" onclick="showTag(this,'&lt;section&gt;','Agrupa conteúdo relacionado que forma uma seção temática. Deve ter um título (h2, h3). Diferente de &lt;div&gt;: tem significado semântico.')">
          <div class="tag-code">&lt;section&gt;</div><div class="tag-name">Seção temática</div>
        </div>
        <div class="tag-item" onclick="showTag(this,'&lt;article&gt;','Conteúdo independente e reutilizável: post de blog, notícia, comentário. Deve fazer sentido fora do contexto da página.')">
          <div class="tag-code">&lt;article&gt;</div><div class="tag-name">Conteúdo independente</div>
        </div>
        <div class="tag-item" onclick="showTag(this,'&lt;aside&gt;','Conteúdo complementar: barra lateral, anúncios, links relacionados. Visualmente costuma ser uma coluna lateral.')">
          <div class="tag-code">&lt;aside&gt;</div><div class="tag-name">Conteúdo lateral</div>
        </div>
        <div class="tag-item" onclick="showTag(this,'&lt;footer&gt;','Rodapé de uma página ou seção. Contém copyright, links secundários, informações de contato.')">
          <div class="tag-code">&lt;footer&gt;</div><div class="tag-name">Rodapé</div>
        </div>
        <div class="tag-item" onclick="showTag(this,'&lt;h1&gt; ao &lt;h6&gt;','Hierarquia de títulos. h1 = título principal da página (apenas 1 por página). h2 = seções. h3 = subseções. Nunca pule níveis por questões visuais — use CSS para isso.')">
          <div class="tag-code">&lt;h1&gt;–&lt;h6&gt;</div><div class="tag-name">Hierarquia de títulos</div>

let cur = 0;
let timerInterval = null;
let timerStarted = false;

function buildDots() {
  const bar = document.getElementById('dots-bar');
  SLIDES.forEach((s, i) => {
    const d = document.createElement('span');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.title = 'Slide ' + (i + 1);
    d.onclick = () => goTo(i);
    bar.appendChild(d);
    if (i < SLIDES.length - 1) {
      const sep = document.createElement('div');
      sep.className = 'dot-sep';
      bar.appendChild(sep);
    }
  });
}

function buildSlides() {
  const wrap = document.getElementById('slide-wrap');
  SLIDES.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.id = 'sl-' + s.id;
    div.innerHTML = s.render();
    wrap.appendChild(div);
  });
}

function goTo(i) {
  const prev = cur;
  document.getElementById('sl-' + SLIDES[prev].id).classList.remove('active');
  const dots = document.querySelectorAll('.dot');
  dots[prev].classList.remove('active');
  if (i > prev) dots[prev].classList.add('done');

  cur = i;
  const el = document.getElementById('sl-' + SLIDES[cur].id);
  el.innerHTML = SLIDES[cur].render();
  el.classList.add('active');
  dots[cur].classList.add('active');
  dots[cur].classList.remove('done');

  document.getElementById('btn-prev').disabled = cur === 0;
  const btnNext = document.getElementById('btn-next');
  btnNext.disabled = cur === SLIDES.length - 1;
  btnNext.textContent = cur === SLIDES.length - 1 ? 'Finalizar' : 'Próximo →';
  document.getElementById('counter').textContent = (cur + 1) + ' / ' + SLIDES.length;

  if (!timerStarted) { timerStarted = true; startTimer(); }
}

function nav(d) {
  const ni = cur + d;
  if (ni >= 0 && ni < SLIDES.length) goTo(ni);
}

function startTimer() {
  let rem = 30 * 60;
  const el = document.getElementById('timer');
  timerInterval = setInterval(() => {
    rem--;
    if (rem <= 0) { clearInterval(timerInterval); el.textContent = '00:00'; el.className = 'timer danger'; return; }
    const m = Math.floor(rem / 60), s = rem % 60;
    el.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    if (rem <= 300) el.className = 'timer warn';
    if (rem <= 60)  el.className = 'timer danger';
  }, 1000);
}

function tlClick(i) {
  document.querySelectorAll('.tl-item').forEach((el, j) => el.classList.toggle('tl-open', j === i));
}

function showTag(el, tag, desc) {
  document.querySelectorAll('.tag-item').forEach(t => t.classList.remove('tag-on'));
  el.classList.add('tag-on');
  document.getElementById('tag-prev').innerHTML =
    '<strong>' + tag + '</strong><br>' + desc;
}

function answer(el, type, fbId) {
  const block = el.closest('.quiz-block');
  block.querySelectorAll('.quiz-opt').forEach(o => {
    if (o === el) o.classList.add(type === 'c' ? 'correct' : 'wrong');
    else o.classList.add('dimmed');
  });
  const fb = document.getElementById(fbId);
  if (type !== 'c') {
    fb.style.background = '#fef2f2';
    fb.style.color = '#dc2626';
    fb.textContent = 'Não exatamente — qual tag representa o conteúdo central e único da página?';
  }
  fb.style.display = 'block';
}

buildDots();
buildSlides();
document.getElementById('btn-prev').disabled = true;
</script>
